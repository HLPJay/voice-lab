<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice Lab 测试面板</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: #f5f7fa;
    color: #1a1a2e;
    min-height: 100vh;
    padding: 24px 16px 48px;
  }

  .container {
    max-width: 800px;
    margin: 0 auto;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 12px;
  }

  header .title-block {
    text-align: center;
    flex: 1;
    min-width: 200px;
  }

  header h1 {
    font-size: 1.8rem;
    font-weight: 700;
    color: #2d3748;
    letter-spacing: -0.5px;
  }

  header p {
    font-size: 0.875rem;
    color: #718096;
    margin-top: 4px;
  }

  .header-link {
    font-size: 0.85rem;
    color: #5a67d8;
    text-decoration: none;
    padding: 6px 14px;
    border: 1px solid #c7d2fe;
    border-radius: 6px;
    background: #ebf4ff;
    transition: background 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .header-link:hover { background: #dbeafe; }

  /* Tab navigation */
  .tab-nav {
    display: flex;
    gap: 4px;
    margin-bottom: 20px;
    border-bottom: 2px solid #e2e8f0;
    padding-bottom: 0;
    overflow-x: auto;
  }

  .tab-btn {
    padding: 10px 20px;
    border: none;
    background: transparent;
    color: #718096;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .tab-btn:hover { color: #5a67d8; }

  .tab-btn.active {
    color: #5a67d8;
    border-bottom-color: #5a67d8;
  }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .card {
    background: #fff;
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    border: 1px solid #e2e8f0;
  }

  .card-title {
    font-size: 0.8rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #a0aec0;
    margin-bottom: 14px;
  }

  /* Textarea */
  .textarea-wrap { position: relative; }

  textarea {
    width: 100%;
    min-height: 100px;
    padding: 14px;
    border: 1.5px solid #e2e8f0;
    border-radius: 8px;
    font-size: 0.95rem;
    line-height: 1.7;
    resize: vertical;
    transition: border-color 0.2s;
    font-family: inherit;
  }

  textarea:focus { outline: none; border-color: #5a67d8; }

  .char-count {
    position: absolute;
    bottom: 10px;
    right: 12px;
    font-size: 0.75rem;
    color: #a0aec0;
    pointer-events: none;
  }

  /* Config grid */
  .config-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .form-group.full-width { grid-column: 1 / -1; }

  label {
    font-size: 0.8rem;
    font-weight: 500;
    color: #4a5568;
  }

  select, input[type="number"], input[type="text"], input[type="file"] {
    padding: 9px 12px;
    border: 1.5px solid #e2e8f0;
    border-radius: 8px;
    font-size: 0.9rem;
    font-family: inherit;
    background: #fff;
    transition: border-color 0.2s;
    appearance: none;
  }

  select:focus, input:focus { outline: none; border-color: #5a67d8; }

  input[type="file"] {
    appearance: none;
    padding: 7px 12px;
    cursor: pointer;
  }

  .radio-group {
    display: flex;
    gap: 20px;
    padding: 9px 0;
  }

  .radio-group label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.9rem;
    font-weight: 400;
    cursor: pointer;
    color: #2d3748;
  }

  input[type="checkbox"] {
    width: 16px;
    height: 16px;
    cursor: pointer;
    accent-color: #5a67d8;
  }

  .checkbox-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 0;
  }

  .variant-count-row {
    display: none;
    padding: 9px 0 0;
  }

  .variant-count-row.visible { display: block; }

  /* Buttons */
  .btn-primary {
    width: 100%;
    padding: 13px;
    background: #5a67d8;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, opacity 0.2s;
    margin-top: 16px;
  }

  .btn-primary:hover:not(:disabled) { background: #4c51bf; }
  .btn-primary:disabled { opacity: 0.55; cursor: not-allowed; }

  .btn-danger { background: #e53e3e; }
  .btn-danger:hover:not(:disabled) { background: #c53030; }

  .btn-sm {
    padding: 6px 14px;
    background: #edf2f7;
    color: #2d3748;
    border: 1px solid #cbd5e0;
    border-radius: 6px;
    font-size: 0.82rem;
    cursor: pointer;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    transition: background 0.15s;
  }

  .btn-sm:hover { background: #e2e8f0; }

  /* Results */
  .results-area { display: none; }
  .results-area.visible { display: block; }

  .result-section { margin-bottom: 28px; }
  .result-section:last-child { margin-bottom: 0; }

  .result-label {
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #a0aec0;
    margin-bottom: 10px;
  }

  .job-status {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 0.78rem;
    font-weight: 600;
    background: #ebf8ff;
    color: #2b6cb0;
  }

  .job-status.status-success { background: #f0fff4; color: #276749; }
  .job-status.status-failed  { background: #fff5f5; color: #c53030; }
  .job-status.status-running  { background: #fefcbf; color: #b7791f; }
  .job-status.status-processing { background: #fefcbf; color: #b7791f; }

  .poll-status {
    font-size: 0.85rem;
    color: #718096;
    margin-top: 8px;
  }

  .audio-player {
    width: 100%;
    margin-top: 10px;
    border-radius: 8px;
  }

  .action-row {
    display: flex;
    gap: 10px;
    margin-top: 10px;
    flex-wrap: wrap;
  }

  /* Variant cards */
  .variants-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .variant-card {
    background: #f7fafc;
    border: 1px solid #e2e8f0;
    border-radius: 10px;
    padding: 16px;
  }

  .variant-card .variant-meta {
    font-size: 0.78rem;
    color: #718096;
    margin-bottom: 10px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .variant-card .variant-meta span {
    background: #edf2f7;
    padding: 2px 8px;
    border-radius: 4px;
  }

  .variant-card audio {
    width: 100%;
    margin-top: 8px;
    height: 36px;
  }

  .variant-card .action-row { margin-top: 8px; }

  /* Error */
  .error-msg {
    background: #fff5f5;
    border: 1px solid #feb2b2;
    border-radius: 8px;
    padding: 12px 16px;
    color: #c53030;
    font-size: 0.875rem;
    margin-top: 10px;
  }

  /* Success */
  .success-msg {
    background: #f0fff4;
    border: 1px solid #9ae6b4;
    border-radius: 8px;
    padding: 12px 16px;
    color: #276749;
    font-size: 0.875rem;
    margin-top: 10px;
  }

  /* Timeline */
  .timeline-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
    font-size: 0.82rem;
  }

  .timeline-table th {
    text-align: left;
    color: #a0aec0;
    font-weight: 500;
    padding: 4px 8px;
    border-bottom: 1px solid #e2e8f0;
  }

  .timeline-table td {
    padding: 5px 8px;
    border-bottom: 1px solid #f0f4f8;
    color: #2d3748;
  }

  .timeline-table tr:last-child td { border-bottom: none; }

  /* Voice list table */
  .voice-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 12px;
    font-size: 0.82rem;
  }

  .voice-table th {
    text-align: left;
    color: #a0aec0;
    font-weight: 500;
    padding: 6px 8px;
    border-bottom: 1px solid #e2e8f0;
  }

  .voice-table td {
    padding: 7px 8px;
    border-bottom: 1px solid #f0f4f8;
    color: #2d3748;
  }

  .voice-table tr:last-child td { border-bottom: none; }

  .voice-table tr:hover td { background: #f7fafc; }

  .tag {
    display: inline-block;
    padding: 2px 7px;
    border-radius: 4px;
    font-size: 0.72rem;
    font-weight: 500;
  }

  .tag-system { background: #ebf8ff; color: #2b6cb0; }
  .tag-clone { background: #faf5ff; color: #6b46c1; }
  .tag-generation { background: #fffaf0; color: #c05621; }

  /* Step indicator */
  .step-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
    font-size: 0.82rem;
    color: #718096;
  }

  .step-indicator .step-num {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: #e2e8f0;
    color: #718096;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    font-weight: 600;
  }

  .step-indicator .step-num.done {
    background: #c6f6d5;
    color: #276749;
  }

  .step-indicator .step-num.active {
    background: #5a67d8;
    color: #fff;
  }

  /* Loading spinner */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }

  .loading .spinner { border-color: rgba(90,103,216,0.3); border-top-color: #5a67d8; }

  /* Audio hex player */
  .hex-player {
    margin-top: 10px;
    background: #f7fafc;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    padding: 12px;
    font-size: 0.82rem;
    color: #4a5568;
  }

  .hex-player audio { width: 100%; margin-top: 8px; height: 36px; }

  /* Delete form row */
  .delete-form-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr auto;
    gap: 12px;
    align-items: end;
  }

  @media (max-width: 600px) {
    .config-grid { grid-template-columns: 1fr; }
    .variants-grid { grid-template-columns: 1fr; }
    .delete-form-row { grid-template-columns: 1fr 1fr; }
    .tab-nav { gap: 0; }
    .tab-btn { padding: 8px 12px; font-size: 0.82rem; }
  }

  /* Voice params */
  .param-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
  }
  .param-item {
      flex: 1;
      min-width: 100px;
  }
  .param-item label {
      display: block;
      font-size: 0.78rem;
      color: #718096;
      margin-bottom: 4px;
  }
  .param-item input, .param-item select {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      font-size: 0.85rem;
  }

  /* Stream */
  .stream-progress {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 12px 0;
    font-size: 0.9rem;
    color: #4a5568;
  }

  .stream-stats {
    display: flex;
    gap: 24px;
    font-size: 0.82rem;
    color: #718096;
    margin-top: 8px;
    padding: 8px 12px;
    background: #f7fafc;
    border-radius: 6px;
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="title-block">
      <h1>Voice Lab 测试面板</h1>
      <p>MiniMax 语音接口测试与验证平台</p>
    </div>
    <a href="/static/admin.html" class="header-link">管理面板 →</a>
  </header>

  <!-- Tab Navigation -->
  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="tts">T2A 生成</button>
    <button class="tab-btn" data-tab="voices">音色管理</button>
    <button class="tab-btn" data-tab="clone">声音克隆</button>
    <button class="tab-btn" data-tab="design">声音设计</button>
    <button class="tab-btn" data-tab="bindings">绑定管理</button>
    <button class="tab-btn" data-tab="batch">批量生成</button>
  </nav>

  <!-- ======================== TAB: TTS ======================== -->
  <div class="tab-content active" id="tab-tts">
    <div class="card">
      <div class="card-title">文案输入</div>
      <div class="textarea-wrap">
        <textarea id="textInput" placeholder="输入文案..." maxlength="9500"></textarea>
        <span class="char-count" id="charCount">0 / 9500</span>
      </div>
    </div>

    <div class="card">
      <div class="card-title">配置</div>
      <div class="config-grid">
        <div class="form-group">
          <label for="profileSelect">声音人设</label>
          <select id="profileSelect">
            <option value="">加载中…</option>
          </select>
        </div>
        <div class="form-group">
          <label for="providerSelect">Provider</label>
          <select id="providerSelect">
            <option value="mock">mock（模拟）</option>
            <option value="minimax">minimax（正式）</option>
          </select>
        </div>
        <div class="form-group">
          <label for="outputFormat">音频格式</label>
          <select id="outputFormat">
            <option value="mp3">MP3</option>
            <option value="wav">WAV</option>
            <option value="flac">FLAC</option>
            <option value="pcm">PCM</option>
          </select>
        </div>
        <div class="form-group full-width">
          <label>语音参数（可选，不填使用绑定默认值）</label>
          <div class="param-row">
            <div class="param-item">
              <label for="paramSpeed">语速</label>
              <input type="number" id="paramSpeed" step="0.05" min="0.5" max="2.0" placeholder="0.5-2.0">
            </div>
            <div class="param-item">
              <label for="paramVol">音量</label>
              <input type="number" id="paramVol" step="0.1" min="0.1" max="10.0" placeholder="0.1-10.0">
            </div>
            <div class="param-item">
              <label for="paramPitch">音调</label>
              <input type="number" id="paramPitch" step="1" min="-12" max="12" placeholder="-12~12">
            </div>
            <div class="param-item">
              <label for="paramEmotion">情绪</label>
              <select id="paramEmotion">
                <option value="">默认</option>
                <option value="happy">happy</option>
                <option value="sad">sad</option>
                <option value="angry">angry</option>
                <option value="fearful">fearful</option>
                <option value="disgusted">disgusted</option>
                <option value="surprised">surprised</option>
                <option value="neutral">neutral</option>
              </select>
            </div>
          </div>
        </div>
        <div class="form-group full-width">
          <label>生成模式</label>
          <div class="radio-group">
            <label><input type="radio" name="genMode" value="single" checked> 单条生成</label>
            <label><input type="radio" name="genMode" value="async"> 异步生成</label>
            <label><input type="radio" name="genMode" value="stream"> 流式生成</label>
            <label><input type="radio" name="genMode" value="variants"> 多版本试音</label>
          </div>
          <div class="variant-count-row" id="variantCountRow">
            <label for="variantCount">版本数量（1-5）</label>
            <input type="number" id="variantCount" min="1" max="5" value="3">
          </div>
        </div>
        <div class="form-group full-width" id="subtitleRow">
          <div class="checkbox-row">
            <input type="checkbox" id="needSubtitle" checked>
            <label for="needSubtitle" style="font-weight:400;cursor:pointer">生成字幕</label>
          </div>
        </div>
      </div>
    </div>

    <button class="btn-primary" id="generateBtn" onclick="handleGenerate()">生成</button>
    <div class="results-area" id="resultsArea"></div>

    <div class="card" style="margin-top:16px" id="historyCard">
      <div class="card-title" style="cursor:pointer" onclick="toggleHistory()" id="historyToggle">
        历史记录 ▾
      </div>
      <div id="historyArea" style="display:none">
        <div id="historyList"></div>
        <button class="btn-sm" id="loadMoreHistory" onclick="loadMoreHistory()" style="display:none;margin-top:8px">加载更多</button>
      </div>
    </div>
  </div>

  <!-- ======================== TAB: VOICES ======================== -->
  <div class="tab-content" id="tab-voices">
    <div class="card">
      <div class="card-title">音色列表查询</div>
      <div class="config-grid">
        <div class="form-group">
          <label for="voiceProvider">Provider</label>
          <select id="voiceProvider">
            <option value="mock">mock</option>
            <option value="minimax">minimax</option>
          </select>
        </div>
        <div class="form-group">
          <label for="voiceType">音色类型</label>
          <select id="voiceType">
            <option value="all">全部</option>
            <option value="system">系统音色</option>
            <option value="voice_cloning">克隆音色</option>
            <option value="voice_generation">设计音色</option>
          </select>
        </div>
      </div>
      <button class="btn-primary" id="listVoicesBtn" onclick="handleListVoices()">查询音色</button>
      <div class="form-group" style="margin-top:12px">
        <input type="text" id="voiceSearch" placeholder="输入关键词过滤音色（名称 / voice_id / 描述）…" oninput="filterVoiceList()" style="width:100%;padding:8px;border:1px solid #e2e8f0;border-radius:6px;font-size:0.85rem">
      </div>
      <div id="voiceListResults"></div>
    </div>

    <div class="card">
      <div class="card-title">删除音色</div>
      <div class="delete-form-row">
        <div class="form-group">
          <label for="deleteProvider">Provider</label>
          <select id="deleteProvider">
            <option value="mock">mock</option>
            <option value="minimax">minimax</option>
          </select>
        </div>
        <div class="form-group">
          <label for="deleteVoiceId">voice_id</label>
          <input type="text" id="deleteVoiceId" placeholder="输入 voice_id">
        </div>
        <div class="form-group">
          <label for="deleteVoiceType">音色类型</label>
          <select id="deleteVoiceType">
            <option value="voice_cloning">voice_cloning</option>
            <option value="voice_generation">voice_generation</option>
          </select>
        </div>
        <button class="btn-primary btn-danger" style="margin-top:0" onclick="handleDeleteVoice()">删除</button>
      </div>
      <div id="deleteResults"></div>
    </div>
  </div>

  <!-- ======================== TAB: CLONE ======================== -->
  <div class="tab-content" id="tab-clone">
    <div class="card">
      <div class="card-title">步骤 1：上传克隆音频</div>
      <div class="config-grid">
        <div class="form-group">
          <label for="cloneProvider">Provider</label>
          <select id="cloneProvider">
            <option value="mock">mock</option>
            <option value="minimax">minimax</option>
          </select>
        </div>
        <div class="form-group">
          <label for="clonePurpose">用途</label>
          <select id="clonePurpose">
            <option value="voice_clone">voice_clone（克隆）</option>
            <option value="prompt_audio">prompt_audio（提示音）</option>
          </select>
        </div>
        <div class="form-group full-width">
          <label for="cloneFile">选择音频文件（.mp3/.m4a/.wav）</label>
          <input type="file" id="cloneFile" accept=".mp3,.m4a,.wav,audio/*">
        </div>
      </div>
      <button class="btn-primary" id="uploadBtn" onclick="handleUploadAudio()">上传</button>
      <div id="uploadResult"></div>
    </div>

    <div class="card">
      <div class="card-title">步骤 2：执行克隆</div>
      <div class="config-grid">
        <div class="form-group">
          <label for="cloneVoiceId">voice_id（自定义标识）</label>
          <input type="text" id="cloneVoiceId" placeholder="如 my_voice_01" value="">
        </div>
        <div class="form-group">
          <label for="cloneFileId">file_id（上传后自动填充）</label>
          <input type="number" id="cloneFileId" placeholder="从步骤1获取" value="">
        </div>
        <div class="form-group">
          <label for="clonePromptFileId">prompt_file_id（可选）</label>
          <input type="number" id="clonePromptFileId" placeholder="prompt音频file_id">
        </div>
        <div class="form-group">
          <label for="clonePromptText">prompt_text（可选）</label>
          <input type="text" id="clonePromptText" placeholder="提示文本">
        </div>
        <div class="form-group">
          <label for="clonePreviewText">preview_text（试听文本）</label>
          <input type="text" id="clonePreviewText" placeholder="试听用短文本">
        </div>
        <div class="form-group">
          <label for="cloneModel">model（可选）</label>

<script>
  // ============================================================
  // Tab switching
  // ============================================================
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
    });
  });

  // Event delegation for dynamic bind-voice buttons (avoids XSS from inline onclick)
  document.addEventListener('click', e => {
    const btn = e.target.closest('.bind-voice-btn');
    if (!btn) return;
    const voiceId = btn.dataset.voiceId;
    const name = btn.dataset.name;
    const provider = btn.dataset.provider;
    quickBindVoice(voiceId, name, provider);
  });

  // ============================================================
  // TTS Tab
  // ============================================================
  const textInput = document.getElementById('textInput');
  const charCount = document.getElementById('charCount');
  const profileSelect = document.getElementById('profileSelect');
  const providerSelect = document.getElementById('providerSelect');
  const genModes = document.getElementsByName('genMode');
  const variantCountRow = document.getElementById('variantCountRow');
  const variantCountInput = document.getElementById('variantCount');
  const needSubtitle = document.getElementById('needSubtitle');
  const generateBtn = document.getElementById('generateBtn');
  const resultsArea = document.getElementById('resultsArea');

  textInput.addEventListener('input', () => {
    charCount.textContent = `${textInput.value.length} / 9500`;
  });

  genModes.forEach(r => r.addEventListener('change', () => {
    const mode = document.querySelector('input[name="genMode"]:checked').value;
    variantCountRow.classList.toggle('visible', mode === 'variants');
    document.getElementById('subtitleRow').style.display = mode === 'stream' ? 'none' : '';
  }));

  (async () => {
    try {
      const res = await fetch('/api/voice/profiles');
      const profiles = await res.json();
      profileSelect.innerHTML = '';
      if (!profiles || profiles.length === 0) {
        profileSelect.innerHTML = '<option value="">无可用人设</option>';
        return;
      }
      profiles.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p.id;
        opt.textContent = p.name;
        profileSelect.appendChild(opt);
      });

      // Also populate binding tab selects
      const bindingSelects = ['bindingProfileSelect', 'newBindingProfile'];
      bindingSelects.forEach(selectId => {
        const sel = document.getElementById(selectId);
        if (!sel) return;
        sel.innerHTML = '';
        profiles.forEach(p => {
          const opt = document.createElement('option');
          opt.value = p.id;
          opt.textContent = p.name;
          sel.appendChild(opt);
        });
      });
    } catch (e) {
      profileSelect.innerHTML = '<option value="">加载失败</option>';
    }
  })();

  function setLoading(on) {
    generateBtn.disabled = on;
    generateBtn.innerHTML = on
      ? '<span class="spinner"></span>生成中…'
      : '生成';
  }

  function statusLabel(s) {
    const m = { success: '已完成', failed: '失败', running: '生成中', pending: '等待中', processing: '处理中' };
    return m[s] || s;
  }

  function statusClass(s) {
    return 'job-status status-' + s;
  }

  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  let pollTimer = null;

  // ============================================================
  // History
  // ============================================================
  let _historyOffset = 0;
  let _historyTotal = 0;
  let _historyLoading = false;

  function toggleHistory() {
    const area = document.getElementById('historyArea');
    const toggle = document.getElementById('historyToggle');
    const isOpen = area.style.display !== 'none';
    area.style.display = isOpen ? 'none' : '';
    toggle.textContent = isOpen ? '历史记录 ▾' : '历史记录 ▴';
    if (!isOpen && !_historyOffset) {
      loadHistory(0);
    }
  }

  async function loadHistory(offset = 0) {
    if (_historyLoading) return;
    const listEl = document.getElementById('historyList');
    const moreBtn = document.getElementById('loadMoreHistory');
    if (offset === 0) {
      _historyOffset = 0;
      _historyTotal = 0;
      listEl.innerHTML = '<div style="font-size:0.82rem;color:#718096">加载中…</div>';
    }
    _historyLoading = true;
    try {
      const resp = await fetch(`/api/voice/jobs?limit=10&offset=${offset}`);
      const data = await resp.json();
      if (!resp.ok) return;
      _historyTotal = data.total || 0;
      const jobs = data.jobs || [];

      if (offset === 0) listEl.innerHTML = '';
      if (jobs.length === 0 && offset === 0) {
        listEl.innerHTML = '<div style="font-size:0.82rem;color:#718096">暂无历史记录</div>';
        moreBtn.style.display = 'none';
        return;
      }

      const fragment = document.createDocumentFragment();
      const typeMap = { sync_render: '单条', async_render: '异步', stream_render: '流式' };
      jobs.forEach(job => {
        const typeLabel = typeMap[job.job_type] || job.job_type;
        const textSnippet = (job.input_text || '').slice(0, 30) + ((job.input_text || '').length > 30 ? '…' : '');
        const time = job.created_at ? job.created_at.replace('T', ' ').slice(0, 19) : '';
        const div = document.createElement('div');
        div.style.cssText = 'display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid #f0f0f0;font-size:0.82rem';
        div.innerHTML = `<span style="color:#718096;min-width:140px">${esc(time)}</span>
          <span class="tag" style="min-width:50px">${esc(typeLabel)}</span>
          <span class="job-status status-${job.status}">${esc(job.status)}</span>
          <span style="flex:1;color:#4a5568" title="${esc(job.input_text || '')}">${esc(textSnippet)}</span>
          <span style="color:#a0aec0">${esc(job.provider || '')}</span>`;
        fragment.appendChild(div);
      });
      listEl.appendChild(fragment);

      _historyOffset = offset + jobs.length;
      moreBtn.style.display = _historyOffset < _historyTotal ? '' : 'none';
    } catch (e) {
      if (offset === 0) listEl.innerHTML = '<div style="font-size:0.82rem;color:#c53030">加载失败</div>';
    } finally {
      _historyLoading = false;
    }
  }

  function loadMoreHistory() {
    if (_historyLoading) return;
    loadHistory(_historyOffset);
  }

  // Load history on page init
  loadHistory(0);

  async function handleGenerate() {
    const text = textInput.value.trim();
    if (!text) { alert('请输入文案'); return; }
    const profileId = profileSelect.value;
    if (!profileId) { alert('请选择声音人设'); return; }
    const provider = providerSelect.value;
    const mode = document.querySelector('input[name="genMode"]:checked').value;
    const isVariant = mode === 'variants';
    const isAsync = mode === 'async';
    const isStream = mode === 'stream';
    const count = parseInt(variantCountInput.value) || 3;
    const subtitle = needSubtitle.checked;
    const outputFormat = document.getElementById('outputFormat').value;
    const speed = document.getElementById('paramSpeed').value;
    const vol = document.getElementById('paramVol').value;
    const pitch = document.getElementById('paramPitch').value;
    const emotion = document.getElementById('paramEmotion').value;

    if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
    setLoading(true);
    resultsArea.classList.remove('visible');
    resultsArea.innerHTML = '';

    if (isStream) {
      startStreamGenerate(text, profileId, provider, subtitle, outputFormat, { speed, vol, pitch, emotion });
      return;
    }

    try {
      const payload = {
        text,
        profile_id: profileId,
        provider,
        need_subtitle: subtitle,
        output_format: outputFormat,
        ...(speed ? { speed: parseFloat(speed) } : {}),
        ...(vol ? { vol: parseFloat(vol) } : {}),
        ...(pitch ? { pitch: parseInt(pitch) } : {}),
        ...(emotion ? { emotion } : {}),
        ...(isVariant ? { variant_count: Math.min(5, Math.max(1, count)), scene: '试音台' } : {})
      };

      let endpoint;
      if (isAsync) endpoint = '/api/voice/render/async';
      else if (isVariant) endpoint = '/api/voice/variants/render';
      else endpoint = '/api/voice/render';

      const resp = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      const data = await resp.json();

      if (!resp.ok) {
        const msg = data.detail || JSON.stringify(data);
        resultsArea.innerHTML = `<div class="error-msg">请求失败：${esc(msg)}</div>`;
        resultsArea.classList.add('visible');
        setLoading(false);
        return;
      }

      if (isAsync) {
        startAsyncPolling(data.job_id);
      } else {
        renderResults(data, isVariant);
        resultsArea.classList.add('visible');
        setLoading(false);
        loadHistory(0);
      }
    } catch (e) {
      resultsArea.innerHTML = `<div class="error-msg">网络错误：${esc(e.message)}</div>`;
      resultsArea.classList.add('visible');
      setLoading(false);
    }
  }

  function startStreamGenerate(text, profileId, provider, subtitle, outputFormat, voiceParams) {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsUrl = `${proto}//${location.host}/api/voice/ws/render`;

    resultsArea.innerHTML = `
        <div class="card" id="streamStatusCard">
            <div class="result-label">流式生成</div>
            <div class="stream-progress">
                <span class="spinner"></span>
                <span id="streamStatusText">连接中…</span>
            </div>
            <div class="stream-stats" id="streamStats" style="display:none">
                <span>已接收: <strong id="streamChunkCount">0</strong> 个片段</span>
                <span>已接收时长: <strong id="streamDuration">0</strong> ms</span>
            </div>
        </div>`;
    resultsArea.classList.add('visible');

    const ws = new WebSocket(wsUrl);
    const audioChunks = [];

    ws.onopen = () => {
        const { speed, vol, pitch, emotion } = voiceParams || {};
        ws.send(JSON.stringify({
            event: "start",
            text: text,
            profile_id: profileId,
            provider: provider,
            output_format: outputFormat,
            need_subtitle: subtitle,
            ...(speed ? { speed: parseFloat(speed) } : {}),
            ...(vol ? { vol: parseFloat(vol) } : {}),
            ...(pitch ? { pitch: parseInt(pitch) } : {}),
            ...(emotion ? { emotion } : {}),
        }));
    };

    ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);

        switch (msg.event) {
            case "connected":
                document.getElementById('streamStatusText').textContent =
                    `已连接 (${msg.request_id})`;
                break;
            case "started":
                document.getElementById('streamStatusText').textContent =
                    `生成中… (${msg.provider} / ${msg.model})`;
                document.getElementById('streamStats').style.display = '';
                break;
            case "audio_chunk":
                audioChunks.push(msg.audio_base64);
                document.getElementById('streamChunkCount').textContent =
                    audioChunks.length;
                if (msg.duration_ms) {
                    const el = document.getElementById('streamDuration');
                    el.textContent = parseInt(el.textContent || '0') + msg.duration_ms;
                }
                break;
            case "completed":
                renderStreamResult(msg, audioChunks);
                setLoading(false);
                loadHistory(0);
                ws.close();
                break;
            case "error":
                resultsArea.innerHTML = `<div class="error-msg">流式生成失败：[${esc(msg.code)}] ${esc(msg.message)}</div>`;
                resultsArea.classList.add('visible');
                setLoading(false);
                ws.close();
                break;
        }
    };

    ws.onerror = () => {
        resultsArea.innerHTML = `<div class="error-msg">WebSocket 连接失败</div>`;
        resultsArea.classList.add('visible');
        setLoading(false);
    };

    ws.onclose = (event) => {
        if (event.code !== 1000 && !resultsArea.querySelector('.result-section') && !resultsArea.querySelector('.error-msg')) {
            resultsArea.innerHTML = `<div class="error-msg">连接断开 (code: ${event.code})</div>`;
            resultsArea.classList.add('visible');
            setLoading(false);
        }
    };
  }

  function renderStreamResult(completed, audioChunks) {
    // Revoke previous blob URL to avoid memory leak
    if (window._streamBlobUrl) {
      URL.revokeObjectURL(window._streamBlobUrl);
      window._streamBlobUrl = null;
    }

    const binaryParts = audioChunks.map(b64 => {
        const binary = atob(b64);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) {
            bytes[i] = binary.charCodeAt(i);
        }
        return bytes;
    });
    const blob = new Blob(binaryParts, { type: 'audio/mpeg' });
    const blobUrl = URL.createObjectURL(blob);
    window._streamBlobUrl = blobUrl;

    const asset = completed.audio_asset;
    resultsArea.innerHTML = `
        <div class="result-section">
            <div class="result-label">流式生成结果</div>

  function startAsyncPolling(jobId) {
    let pollCount = 0;
    const maxPolls = 120;

    resultsArea.innerHTML = `
      <div class="card" id="asyncStatusCard">
        <div class="result-label">异步任务</div>
        <p>任务ID：<code>${esc(jobId)}</code></p>
        <div class="poll-status"><span class="spinner"></span>轮询中…</div>
      </div>`;
    resultsArea.classList.add('visible');

    async function poll() {
      pollCount++;
      try {
        const resp = await fetch(`/api/voice/render/async/${jobId}/status`);
        const data = await resp.json();

        if (!resp.ok) {
          clearInterval(pollTimer); pollTimer = null;
          resultsArea.innerHTML = `<div class="error-msg">查询失败：${esc(data.detail || JSON.stringify(data))}</div>`;
          setLoading(false);
          return;
        }

        if (data.status === 'success') {
          clearInterval(pollTimer); pollTimer = null;
          renderAsyncResult(data);
          setLoading(false);
          loadHistory(0);
          return;
        }

        if (data.status === 'failed') {
          clearInterval(pollTimer); pollTimer = null;
          resultsArea.innerHTML = `<div class="error-msg">任务失败：${esc(data.error_message || '未知错误')}</div>`;
          setLoading(false);
          return;
        }

        const statusCard = document.getElementById('asyncStatusCard');
        if (statusCard) {
          const pollStatus = statusCard.querySelector('.poll-status');
          if (pollStatus) pollStatus.innerHTML = `<span class="spinner"></span>轮询中… (${pollCount}/${maxPolls})`;
        }

        if (pollCount >= maxPolls) {
          clearInterval(pollTimer); pollTimer = null;
          resultsArea.innerHTML += `<div class="error-msg">轮询超时，请稍后手动查询</div>`;
          setLoading(false);
        }
      } catch (e) {
        clearInterval(pollTimer); pollTimer = null;
        resultsArea.innerHTML = `<div class="error-msg">网络错误：${esc(e.message)}</div>`;
        setLoading(false);
      }
    }

    poll();
    pollTimer = setInterval(poll, 3000);
  }

  function timelineTable(timeline) {
    if (!timeline || timeline.length === 0) return '';
    let html = `<table class="timeline-table"><thead><tr><th>时间</th><th>文本</th></tr></thead><tbody>`;
    timeline.forEach(item => {
      const start = formatTime(item.start);
      const end = formatTime(item.end);
      html += `<tr><td>${start} → ${end}</td><td>${esc(item.text || '')}</td></tr>`;
    });
    html += '</tbody></table>';
    return html;
  }

  function formatTime(seconds) {
    if (seconds == null) return '--';
    const s = Math.floor(seconds);
    const m = Math.floor((s % 3600) / 60);
    const sec = s % 60;
    const ms = Math.round((seconds - s) * 1000);
    return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')},${String(ms).padStart(3,'0')}`;
  }

  function filterVoiceList() {
    const voices = window._loadedVoices || [];
    const keyword = document.getElementById('voiceSearch').value.trim().toLowerCase();
    const provider = document.getElementById('voiceProvider').value;
    const resultsEl = document.getElementById('voiceListResults');

    if (!keyword) {
      renderVoiceTable(voices.slice(0, 50), provider, voices.length);
      return;
    }

    const filtered = voices.filter(v => {
      const name = (v.name || '').toLowerCase();
      const voiceId = (v.provider_voice_id || '').toLowerCase();
      const desc = (v.description || '').toLowerCase();
      return name.includes(keyword) || voiceId.includes(keyword) || desc.includes(keyword);
    });
    renderVoiceTable(filtered, provider, voices.length);
  }

          <td style="padding:6px 8px;border-bottom:1px solid #e2e8f0">${esc(b.priority || '')}</td>
          <td style="padding:6px 8px;border-bottom:1px solid #e2e8f0"><span class="job-status status-${b.status === 'available' ? 'success' : 'failed'}">${esc(b.status || '')}</span></td>
          <td style="padding:6px 8px;border-bottom:1px solid #e2e8f0">
            <button class="btn-sm" onclick="handleDeleteBinding('${esc(b.id)}')">删除</button>
          </td>
        </tr>`;
      });
      html += '</tbody></table>';
      resultDiv.innerHTML = html;
    } catch (e) {
      resultDiv.innerHTML = `<div class="error-msg">查询失败：${esc(e.message)}</div>`;
    }
  }

  async function handleCreateBinding() {
    const profileId = document.getElementById('newBindingProfile').value;
    const provider = document.getElementById('newBindingProvider').value;
    const model = document.getElementById('newBindingModel').value.trim();
    const voiceId = document.getElementById('newBindingVoiceId').value.trim();
    const priority = parseInt(document.getElementById('newBindingPriority').value) || 1;
    const paramsStr = document.getElementById('newBindingParams').value.trim();
    const resultDiv = document.getElementById('createBindingResult');

    if (!profileId) { resultDiv.innerHTML = '<div class="error-msg">请选择人设</div>'; return; }
    if (!model) { resultDiv.innerHTML = '<div class="error-msg">请填写 Model</div>'; return; }
    if (!voiceId) { resultDiv.innerHTML = '<div class="error-msg">请填写 Provider Voice ID</div>'; return; }

    let params = {};
    if (paramsStr) {
      try { params = JSON.parse(paramsStr); }
      catch (e) { resultDiv.innerHTML = `<div class="error-msg">参数 JSON 格式错误：${esc(e.message)}</div>`; return; }
    }

    try {
      const resp = await fetch(`/api/voice/profiles/${profileId}/bindings`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          provider,
          model,
          provider_voice_id: voiceId,
          priority,
          params,
        }),
      });
      const data = await resp.json();
      if (!resp.ok) {
        resultDiv.innerHTML = `<div class="error-msg">创建失败：${esc(data.detail || JSON.stringify(data))}</div>`;
        return;
      }
      resultDiv.innerHTML = '<div style="color:#2f855a;font-size:0.85rem">绑定创建成功</div>';
      document.getElementById('newBindingVoiceId').value = '';
      document.getElementById('newBindingParams').value = '';
      // Refresh list if same profile is selected
      if (document.getElementById('bindingProfileSelect').value === profileId) {
        handleListBindings();
      }
    } catch (e) {
      resultDiv.innerHTML = `<div class="error-msg">创建失败：${esc(e.message)}</div>`;
    }
  }

  async function handleDeleteBinding(bindingId) {
    if (!confirm('确定删除该绑定？')) return;
    try {
      const resp = await fetch(`/api/voice/bindings/${bindingId}`, { method: 'DELETE' });
      if (!resp.ok) {
        const data = await resp.json();
        alert('删除失败：' + (data.detail || '未知错误'));
        return;
      }
      handleListBindings();
    } catch (e) {
      alert('删除失败：' + e.message);
    }
  }

  // ============================================================
  // Batch Tab
  // ============================================================

  // Populate batch profile select when profiles are loaded
  (async () => {
    try {
      const res = await fetch('/api/voice/profiles');
      const profiles = await res.json();
      const batchProfile = document.getElementById('batchProfile');
      if (!batchProfile) return;
      batchProfile.innerHTML = '';
      if (!profiles || profiles.length === 0) {
        batchProfile.innerHTML = '<option value="">无可用人设</option>';
        return;
      }
      profiles.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p.id;
        opt.textContent = p.name;
        batchProfile.appendChild(opt);
      });
    } catch (e) {}
  })();

  // Batch mode switch
  document.querySelectorAll('input[name="batchMode"]').forEach(r => {
    r.addEventListener('change', () => {
      const mode = document.querySelector('input[name="batchMode"]:checked').value;
      document.getElementById('batchLongtextPanel').style.display = mode === 'longtext' ? '' : 'none';
      document.getElementById('batchScriptPanel').style.display = mode === 'script' ? '' : 'none';
    });
  });

  // Script lines management
  let _scriptLineCount = 0;
  const _scriptProfiles = {};

  function addScriptLine(role = '', text = '', profileId = '') {
    const container = document.getElementById('scriptLines');
    const id = _scriptLineCount++;
    const row = document.createElement('div');
    row.id = `scriptLine_${id}`;
    row.style.cssText = 'display:flex;gap:8px;align-items:center;margin-bottom:8px';
    row.innerHTML = `
      <input type="text" id="scriptRole_${id}" placeholder="角色名" value="${esc(role)}" style="width:100px;padding:6px;border:1px solid #e2e8f0;border-radius:6px">
      <input type="text" id="scriptText_${id}" placeholder="台词内容" value="${esc(text)}" style="flex:1;padding:6px;border:1px solid #e2e8f0;border-radius:6px">
      <select id="scriptProfile_${id}" style="width:120px;padding:6px;border:1px solid #e2e8f0;border-radius:6px">
        <option value="">选择人设</option>
      </select>
      <button class="btn-sm" onclick="removeScriptLine(${id})" style="padding:6px 10px;color:#e53e3e">删除</button>
    `;
    container.appendChild(row);

    // Populate profile select for this line
    fetch('/api/voice/profiles')
      .then(r => r.json())
      .then(profiles => {
        const sel = document.getElementById(`scriptProfile_${id}`);
        profiles.forEach(p => {
          const opt = document.createElement('option');
          opt.value = p.id;
          opt.textContent = p.name;
          if (p.id === profileId) opt.selected = true;
          sel.appendChild(opt);
        });
      })
      .catch(() => {});
  }

  function removeScriptLine(id) {
    const row = document.getElementById(`scriptLine_${id}`);
    if (row) row.remove();
  }

  // Initialize with 3 empty script lines
  addScriptLine();
  addScriptLine();
  addScriptLine();

  // Batch polling state
  let _batchPollTimer = null;
  let _currentBatchId = null;

  async function handleBatchLongtextSubmit() {
    const text = document.getElementById('batchText').value.trim();
    if (!text) { alert('请输入待分段文本'); return; }
    const profileId = document.getElementById('batchProfile').value;
    if (!profileId) { alert('请选择声音人设'); return; }
    const provider = document.getElementById('batchProvider').value;
    const strategy = document.getElementById('batchStrategy').value;
    const maxChars = parseInt(document.getElementById('batchMaxChars').value) || 2000;
    const silence = parseInt(document.getElementById('batchSilence').value) || 300;
    const outputFormat = document.getElementById('batchOutputFormat').value;
    const needSubtitle = document.getElementById('batchNeedSubtitle').checked;

    const params = {};
    const speed = document.getElementById('batchSpeed').value;
    const vol = document.getElementById('batchVol').value;
    const pitch = document.getElementById('batchPitch').value;
    const emotion = document.getElementById('batchEmotion').value;
    if (speed) params.speed = parseFloat(speed);
    if (vol) params.vol = parseFloat(vol);
    if (pitch) params.pitch = parseInt(pitch);
    if (emotion) params.emotion = emotion;

    const btn = document.getElementById('batchLongtextSubmit');
    btn.disabled = true;
    btn.textContent = '提交中…';

    try {
      const resp = await fetch('/api/voice/batch/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          mode: 'longtext',
          text,
          profile_id: profileId,
          provider,
          segment_strategy: strategy,
          max_segment_chars: maxChars,
          silence_between_ms: silence,
          output_format: outputFormat,
          params,
          need_subtitle: needSubtitle,
        }),
      });
      const data = await resp.json();
      if (!resp.ok) {
        alert('提交失败：' + (data.detail || JSON.stringify(data)));
        return;
      }
      _currentBatchId = data.batch_id;
      showBatchProgress(data.batch_id);
      startBatchPoll(data.batch_id);
    } catch (e) {
      alert('提交失败：' + e.message);
    } finally {
      btn.disabled = false;
      btn.textContent = '提交批量任务';
    }
  }

  async function handleBatchScriptSubmit() {
    const lines = [];
    document.querySelectorAll('[id^="scriptLine_"]').forEach(row => {
      const id = row.id.split('_')[1];
      const role = document.getElementById(`scriptRole_${id}`)?.value.trim() || '';
      const text = document.getElementById(`scriptText_${id}`)?.value.trim() || '';
      const profileId = document.getElementById(`scriptProfile_${id}`)?.value || '';
      if (text) {
        lines.push({ role, text, profile_id: profileId, params: {} });
      }
    });
    if (lines.length === 0) { alert('请至少添加一行台词'); return; }
    if (lines.some(l => !l.profile_id)) { alert('请为每行台词选择声音人设'); return; }

    const provider = document.getElementById('batchScriptProvider').value;
    const silence = parseInt(document.getElementById('batchScriptSilence').value) || 500;
    const outputFormat = document.getElementById('batchScriptOutputFormat').value;
    const needSubtitle = document.getElementById('batchScriptNeedSubtitle').checked;

    const btn = document.getElementById('batchScriptSubmit');
    btn.disabled = true;
    btn.textContent = '提交中…';

    try {
      const resp = await fetch('/api/voice/batch/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          mode: 'script',
          script: lines,
          provider,
          silence_between_ms: silence,
          output_format: outputFormat,
          need_subtitle: needSubtitle,
        }),
      });
      const data = await resp.json();
      if (!resp.ok) {
        alert('提交失败：' + (data.detail || JSON.stringify(data)));
        return;
      }
      _currentBatchId = data.batch_id;
      showBatchProgress(data.batch_id);
      startBatchPoll(data.batch_id);
    } catch (e) {
      alert('提交失败：' + e.message);
    } finally {
      btn.disabled = false;
      btn.textContent = '提交批量任务';
    }
  }

  function showBatchProgress(batchId) {
    document.getElementById('batchProgressPanel').style.display = '';
    document.getElementById('batchProgressTitle').textContent = `(任务ID: ${batchId})`;
    document.getElementById('batchProgressStats').textContent = '加载中…';
    document.getElementById('batchSegmentTable').innerHTML = '';
    document.getElementById('batchCompleteActions').style.display = 'none';
  }

  function startBatchPoll(batchId) {
    if (_batchPollTimer) clearInterval(_batchPollTimer);
    _batchPollTimer = setInterval(() => pollBatchStatus(batchId), 3000);
    pollBatchStatus(batchId);  // immediate first poll
  }

  function stopBatchPoll() {
    if (_batchPollTimer) {
      clearInterval(_batchPollTimer);
      _batchPollTimer = null;
    }
  }

  async function pollBatchStatus(batchId) {
    try {
      const resp = await fetch(`/api/voice/batch/${batchId}/status`);
      if (!resp.ok) return;
      const data = await resp.json();
      renderBatchStatus(data);
    } catch (e) {}
  }

  function renderBatchStatus(data) {
    const total = data.total_segments || 0;
    const completed = data.completed_segments || 0;
    const failed = data.failed_segments || 0;
    const pct = total > 0 ? Math.round((completed / total) * 100) : 0;

    document.getElementById('batchProgressFill').style.width = pct + '%';
    document.getElementById('batchProgressStats').textContent =
      `已完成 ${completed}/${total} 段` + (failed > 0 ? `（失败 ${failed} 段）` : '');

    const table = document.getElementById('batchSegmentTable');
    if (!table) return;

    const statusMap = {
      pending: '等待',
      running: '生成中',
      success: '成功',
      failed: '失败',
    };
    const typeMap = {
      sync_render: '单条',
      async_render: '异步',
      stream_render: '流式',
    };

    let html = `<table style="width:100%;border-collapse:collapse">
      <thead>
        <tr style="text-align:left;color:#718096;font-size:0.80rem">
          <th style="padding:4px 8px">#</th>
          <th style="padding:4px 8px">角色</th>
          <th style="padding:4px 8px">文本摘要</th>
          <th style="padding:4px 8px">状态</th>
          <th style="padding:4px 8px">时长</th>
        </tr>
      </thead>
      <tbody>`;
    data.segments.forEach(seg => {
      const statusClass = seg.status === 'success' ? 'color:#2f855a' : seg.status === 'failed' ? 'color:#c53030' : 'color:#718096';
      html += `<tr style="border-bottom:1px solid #f0f0f0">
        <td style="padding:6px 8px;color:#718096">${seg.index + 1}</td>
        <td style="padding:6px 8px">${esc(seg.role || '—')}</td>
        <td style="padding:6px 8px;color:#4a5568" title="${esc(seg.text_preview)}">${esc(seg.text_preview || '—')}</td>
        <td style="padding:6px 8px;${statusClass}">${esc(statusMap[seg.status] || seg.status)}</td>
        <td style="padding:6px 8px;color:#718096">${seg.duration_ms ? (seg.duration_ms / 1000).toFixed(1) + 's' : '—'}</td>
      </tr>`;
    });
    html += '</tbody></table>';
    table.innerHTML = html;

    // Show complete actions when done
    if (data.status === 'success' || data.status === 'partial') {
      stopBatchPoll();
      const actions = document.getElementById('batchCompleteActions');
      actions.style.display = '';

      if (data.merged_audio) {
        document.getElementById('batchPlayBtn').style.display = '';
        const dlLink = document.getElementById('batchDownloadLink');
        dlLink.href = data.merged_audio.url;
        dlLink.style.display = '';
      } else {
        document.getElementById('batchPlayBtn').style.display = 'none';
        document.getElementById('batchDownloadLink').style.display = 'none';
      }

      document.getElementById('batchRetryBtn').style.display = data.failed_segments > 0 ? '' : 'none';
    }
  }

  async function handleBatchPlay() {
    const batchId = _currentBatchId;
    if (!batchId) return;
    try {
      const resp = await fetch(`/api/voice/batch/${batchId}/status`);
      const data = await resp.json();
      if (!data.merged_audio) return;
      const audioUrl = data.merged_audio.url;
      const player = document.getElementById('batchAudioPlayer');
      player.src = audioUrl;
      player.play().catch(() => {});
    } catch (e) {}
  }

  async function handleBatchRetry() {
    const batchId = _currentBatchId;
    if (!batchId) return;
    if (!confirm('确定重试失败的段？')) return;
    try {
      const resp = await fetch(`/api/voice/batch/${batchId}/retry`, { method: 'POST' });
      const data = await resp.json();
      if (!resp.ok) {
        alert('重试失败：' + (data.detail || JSON.stringify(data)));
        return;
      }
      showBatchProgress(batchId);
      startBatchPoll(batchId);
    } catch (e) {
      alert('重试失败：' + e.message);
    }
  }
</script>
</body>
</html>
