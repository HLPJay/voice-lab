<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice Lab 测试面板</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: #f5f7fa;
    color: #1a1a2e;
    min-height: 100vh;
    padding: 24px 16px 48px;
  }

  .container {
    max-width: 800px;
    margin: 0 auto;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 12px;
  }

  header .title-block {
    text-align: center;
    flex: 1;
    min-width: 200px;
  }

  header h1 {
    font-size: 1.8rem;
    font-weight: 700;
    color: #2d3748;
    letter-spacing: -0.5px;
  }

  header p {
    font-size: 0.875rem;
    color: #718096;
    margin-top: 4px;
  }

  .header-link {
    font-size: 0.85rem;
    color: #5a67d8;
    text-decoration: none;
    padding: 6px 14px;
    border: 1px solid #c7d2fe;
    border-radius: 6px;
    background: #ebf4ff;
    transition: background 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .header-link:hover { background: #dbeafe; }

  /* Tab navigation */
  .tab-nav {
    display: flex;
    gap: 4px;
    margin-bottom: 20px;
    border-bottom: 2px solid #e2e8f0;
    padding-bottom: 0;
    overflow-x: auto;
  }

  .tab-btn {
    padding: 10px 20px;
    border: none;
    background: transparent;
    color: #718096;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .tab-btn:hover { color: #5a67d8; }

  .tab-btn.active {
    color: #5a67d8;
    border-bottom-color: #5a67d8;
  }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .card {
    background: #fff;
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    border: 1px solid #e2e8f0;
  }

  .card-title {
    font-size: 0.8rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #a0aec0;
    margin-bottom: 14px;
  }

  /* Textarea */
  .textarea-wrap { position: relative; }

  textarea {
    width: 100%;
    min-height: 100px;
    padding: 14px;
    border: 1.5px solid #e2e8f0;
    border-radius: 8px;
    font-size: 0.95rem;
    line-height: 1.7;
    resize: vertical;
    transition: border-color 0.2s;
    font-family: inherit;
  }

  textarea:focus { outline: none; border-color: #5a67d8; }

  .char-count {
    position: absolute;
    bottom: 10px;
    right: 12px;
    font-size: 0.75rem;
    color: #a0aec0;
    pointer-events: none;
  }

  /* Config grid */
  .config-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .form-group.full-width { grid-column: 1 / -1; }

  label {
    font-size: 0.8rem;
    font-weight: 500;
    color: #4a5568;
  }

  select, input[type="number"], input[type="text"], input[type="file"] {
    padding: 9px 12px;
    border: 1.5px solid #e2e8f0;
    border-radius: 8px;
    font-size: 0.9rem;
    font-family: inherit;
    background: #fff;
    transition: border-color 0.2s;
    appearance: none;
  }

  select:focus, input:focus { outline: none; border-color: #5a67d8; }

  input[type="file"] {
    appearance: none;
    padding: 7px 12px;
    cursor: pointer;
  }

  .radio-group {
    display: flex;
    gap: 20px;
    padding: 9px 0;
  }

  .radio-group label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.9rem;
    font-weight: 400;
    cursor: pointer;
    color: #2d3748;
  }

  input[type="checkbox"] {
    width: 16px;
    height: 16px;
    cursor: pointer;
    accent-color: #5a67d8;
  }

  .checkbox-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 0;
  }

  .variant-count-row {
    display: none;
    padding: 9px 0 0;
  }

  .variant-count-row.visible { display: block; }

  /* Buttons */
  .btn-primary {
    width: 100%;
    padding: 13px;
    background: #5a67d8;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, opacity 0.2s;
    margin-top: 16px;
  }

  .btn-primary:hover:not(:disabled) { background: #4c51bf; }
  .btn-primary:disabled { opacity: 0.55; cursor: not-allowed; }

  .btn-danger { background: #e53e3e; }
  .btn-danger:hover:not(:disabled) { background: #c53030; }

  .btn-sm {
    padding: 6px 14px;
    background: #edf2f7;
    color: #2d3748;
    border: 1px solid #cbd5e0;
    border-radius: 6px;
    font-size: 0.82rem;
    cursor: pointer;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    transition: background 0.15s;
  }

  .btn-sm:hover { background: #e2e8f0; }

  /* Results */
  .results-area { display: none; }
  .results-area.visible { display: block; }

  .result-section { margin-bottom: 28px; }
  .result-section:last-child { margin-bottom: 0; }

  .result-label {
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #a0aec0;
    margin-bottom: 10px;
  }

  .job-status {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 0.78rem;
    font-weight: 600;
    background: #ebf8ff;
    color: #2b6cb0;
  }

  .job-status.status-success { background: #f0fff4; color: #276749; }
  .job-status.status-failed  { background: #fff5f5; color: #c53030; }
  .job-status.status-running  { background: #fefcbf; color: #b7791f; }
  .job-status.status-processing { background: #fefcbf; color: #b7791f; }

  .poll-status {
    font-size: 0.85rem;
    color: #718096;
    margin-top: 8px;
  }

  .audio-player {
    width: 100%;
    margin-top: 10px;
    border-radius: 8px;
  }

  .action-row {
    display: flex;
    gap: 10px;
    margin-top: 10px;
    flex-wrap: wrap;
  }

  /* Variant cards */
  .variants-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .variant-card {
    background: #f7fafc;
    border: 1px solid #e2e8f0;
    border-radius: 10px;
    padding: 16px;
  }

  .variant-card .variant-meta {
    font-size: 0.78rem;
    color: #718096;
    margin-bottom: 10px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .variant-card .variant-meta span {
    background: #edf2f7;
    padding: 2px 8px;
    border-radius: 4px;
  }

  .variant-card audio {
    width: 100%;
    margin-top: 8px;
    height: 36px;
  }

  .variant-card .action-row { margin-top: 8px; }

  /* Error */
  .error-msg {
    background: #fff5f5;
    border: 1px solid #feb2b2;
    border-radius: 8px;
    padding: 12px 16px;
    color: #c53030;
    font-size: 0.875rem;
    margin-top: 10px;
  }

  /* Success */
  .success-msg {
    background: #f0fff4;
    border: 1px solid #9ae6b4;
    border-radius: 8px;
    padding: 12px 16px;
    color: #276749;
    font-size: 0.875rem;
    margin-top: 10px;
  }

  /* Timeline */
  .timeline-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
    font-size: 0.82rem;
  }

  .timeline-table th {
    text-align: left;
    color: #a0aec0;
    font-weight: 500;
    padding: 4px 8px;
    border-bottom: 1px solid #e2e8f0;
  }

  .timeline-table td {
    padding: 5px 8px;
    border-bottom: 1px solid #f0f4f8;
    color: #2d3748;
  }

  .timeline-table tr:last-child td { border-bottom: none; }

  /* Voice list table */
  .voice-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 12px;
    font-size: 0.82rem;
  }

  .voice-table th {
    text-align: left;
    color: #a0aec0;
    font-weight: 500;
    padding: 6px 8px;
    border-bottom: 1px solid #e2e8f0;
  }

  .voice-table td {
    padding: 7px 8px;
    border-bottom: 1px solid #f0f4f8;
    color: #2d3748;
  }

  .voice-table tr:last-child td { border-bottom: none; }

  .voice-table tr:hover td { background: #f7fafc; }

  .tag {
    display: inline-block;
    padding: 2px 7px;
    border-radius: 4px;
    font-size: 0.72rem;
    font-weight: 500;
  }

  .tag-system { background: #ebf8ff; color: #2b6cb0; }
  .tag-clone { background: #faf5ff; color: #6b46c1; }
  .tag-generation { background: #fffaf0; color: #c05621; }

  /* Step indicator */
  .step-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
    font-size: 0.82rem;
    color: #718096;
  }

  .step-indicator .step-num {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: #e2e8f0;
    color: #718096;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    font-weight: 600;
  }

  .step-indicator .step-num.done {
    background: #c6f6d5;
    color: #276749;
  }

  .step-indicator .step-num.active {
    background: #5a67d8;
    color: #fff;
  }

  /* Loading spinner */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }

  .loading .spinner { border-color: rgba(90,103,216,0.3); border-top-color: #5a67d8; }

  /* Audio hex player */
  .hex-player {
    margin-top: 10px;
    background: #f7fafc;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    padding: 12px;
    font-size: 0.82rem;
    color: #4a5568;
  }

  .hex-player audio { width: 100%; margin-top: 8px; height: 36px; }

  /* Delete form row */
  .delete-form-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr auto;
    gap: 12px;
    align-items: end;
  }

  @media (max-width: 600px) {
    .config-grid { grid-template-columns: 1fr; }
    .variants-grid { grid-template-columns: 1fr; }
    .delete-form-row { grid-template-columns: 1fr 1fr; }
    .tab-nav { gap: 0; }
    .tab-btn { padding: 8px 12px; font-size: 0.82rem; }
  }

  /* Voice params */
  .param-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
  }
  .param-item {
      flex: 1;
      min-width: 100px;
  }
  .param-item label {
      display: block;
      font-size: 0.78rem;
      color: #718096;
      margin-bottom: 4px;
  }
  .param-item input, .param-item select {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      font-size: 0.85rem;
  }

  /* Stream */
  .stream-progress {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 12px 0;
    font-size: 0.9rem;
    color: #4a5568;
  }

  .stream-stats {
    display: flex;
    gap: 24px;
    font-size: 0.82rem;
    color: #718096;
    margin-top: 8px;
    padding: 8px 12px;
    background: #f7fafc;
    border-radius: 6px;
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="title-block">
      <h1>Voice Lab 测试面板</h1>
      <p>MiniMax 语音接口测试与验证平台</p>
    </div>
    <a href="/static/admin.html" class="header-link">管理面板 →</a>
  </header>

  <!-- Tab Navigation -->
  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="tts">T2A 生成</button>
    <button class="tab-btn" data-tab="voices">音色管理</button>
    <button class="tab-btn" data-tab="clone">声音克隆</button>
    <button class="tab-btn" data-tab="design">声音设计</button>
    <button class="tab-btn" data-tab="bindings">绑定管理</button>
  </nav>

  <!-- ======================== TAB: TTS ======================== -->
  <div class="tab-content active" id="tab-tts">
    <div class="card">
      <div class="card-title">文案输入</div>
      <div class="textarea-wrap">
        <textarea id="textInput" placeholder="输入文案..." maxlength="9500"></textarea>
        <span class="char-count" id="charCount">0 / 9500</span>
      </div>
    </div>

    <div class="card">
      <div class="card-title">配置</div>
      <div class="config-grid">
        <div class="form-group">
          <label for="profileSelect">声音人设</label>
          <select id="profileSelect">
            <option value="">加载中…</option>
          </select>
        </div>
        <div class="form-group">
          <label for="providerSelect">Provider</label>
          <select id="providerSelect">
            <option value="mock">mock（模拟）</option>
            <option value="minimax">minimax（正式）</option>
          </select>
        </div>
        <div class="form-group">
          <label for="outputFormat">音频格式</label>
          <select id="outputFormat">
            <option value="mp3">MP3</option>
            <option value="wav">WAV</option>
            <option value="flac">FLAC</option>
            <option value="pcm">PCM</option>
          </select>
        </div>
        <div class="form-group full-width">
          <label>语音参数（可选，不填使用绑定默认值）</label>
          <div class="param-row">
            <div class="param-item">
              <label for="paramSpeed">语速</label>
              <input type="number" id="paramSpeed" step="0.05" min="0.5" max="2.0" placeholder="0.5-2.0">
            </div>
            <div class="param-item">
              <label for="paramVol">音量</label>
              <input type="number" id="paramVol" step="0.1" min="0.1" max="10.0" placeholder="0.1-10.0">
            </div>
            <div class="param-item">
              <label for="paramPitch">音调</label>
              <input type="number" id="paramPitch" step="1" min="-12" max="12" placeholder="-12~12">
            </div>
            <div class="param-item">
              <label for="paramEmotion">情绪</label>
              <select id="paramEmotion">
                <option value="">默认</option>
                <option value="happy">happy</option>
                <option value="sad">sad</option>
                <option value="angry">angry</option>
                <option value="fearful">fearful</option>
                <option value="disgusted">disgusted</option>
                <option value="surprised">surprised</option>
                <option value="neutral">neutral</option>
              </select>
            </div>
          </div>
        </div>
        <div class="form-group full-width">
          <label>生成模式</label>
          <div class="radio-group">
            <label><input type="radio" name="genMode" value="single" checked> 单条生成</label>
            <label><input type="radio" name="genMode" value="async"> 异步生成</label>
            <label><input type="radio" name="genMode" value="stream"> 流式生成</label>
            <label><input type="radio" name="genMode" value="variants"> 多版本试音</label>
          </div>
          <div class="variant-count-row" id="variantCountRow">
            <label for="variantCount">版本数量（1-5）</label>
            <input type="number" id="variantCount" min="1" max="5" value="3">
          </div>
        </div>
        <div class="form-group full-width" id="subtitleRow">
          <div class="checkbox-row">
            <input type="checkbox" id="needSubtitle" checked>
            <label for="needSubtitle" style="font-weight:400;cursor:pointer">生成字幕</label>
          </div>
        </div>
      </div>
    </div>

    <button class="btn-primary" id="generateBtn" onclick="handleGenerate()">生成</button>
    <div class="results-area" id="resultsArea"></div>
  </div>

  <!-- ======================== TAB: VOICES ======================== -->
  <div class="tab-content" id="tab-voices">
    <div class="card">
      <div class="card-title">音色列表查询</div>
      <div class="config-grid">
        <div class="form-group">
          <label for="voiceProvider">Provider</label>
          <select id="voiceProvider">
            <option value="mock">mock</option>
            <option value="minimax">minimax</option>
          </select>
        </div>
        <div class="form-group">
          <label for="voiceType">音色类型</label>
          <select id="voiceType">
            <option value="all">全部</option>
            <option value="system">系统音色</option>
            <option value="voice_cloning">克隆音色</option>
            <option value="voice_generation">设计音色</option>
          </select>
        </div>
      </div>
      <button class="btn-primary" id="listVoicesBtn" onclick="handleListVoices()">查询音色</button>
      <div id="voiceListResults"></div>
    </div>

    <div class="card">
      <div class="card-title">删除音色</div>
      <div class="delete-form-row">
        <div class="form-group">
          <label for="deleteProvider">Provider</label>
          <select id="deleteProvider">
            <option value="mock">mock</option>
            <option value="minimax">minimax</option>
          </select>
        </div>
        <div class="form-group">
          <label for="deleteVoiceId">voice_id</label>
          <input type="text" id="deleteVoiceId" placeholder="输入 voice_id">
        </div>
        <div class="form-group">
          <label for="deleteVoiceType">音色类型</label>
          <select id="deleteVoiceType">
            <option value="voice_cloning">voice_cloning</option>
            <option value="voice_generation">voice_generation</option>
          </select>
        </div>
        <button class="btn-primary btn-danger" style="margin-top:0" onclick="handleDeleteVoice()">删除</button>
      </div>
      <div id="deleteResults"></div>
    </div>
  </div>

  <!-- ======================== TAB: CLONE ======================== -->
  <div class="tab-content" id="tab-clone">
    <div class="card">
      <div class="card-title">步骤 1：上传克隆音频</div>
      <div class="config-grid">
        <div class="form-group">
          <label for="cloneProvider">Provider</label>
          <select id="cloneProvider">
            <option value="mock">mock</option>
            <option value="minimax">minimax</option>
          </select>
        </div>
        <div class="form-group">
          <label for="clonePurpose">用途</label>
          <select id="clonePurpose">
            <option value="voice_clone">voice_clone（克隆）</option>
            <option value="prompt_audio">prompt_audio（提示音）</option>
          </select>
        </div>
        <div class="form-group full-width">
          <label for="cloneFile">选择音频文件（.mp3/.m4a/.wav）</label>
          <input type="file" id="cloneFile" accept=".mp3,.m4a,.wav,audio/*">
        </div>
      </div>
      <button class="btn-primary" id="uploadBtn" onclick="handleUploadAudio()">上传</button>
      <div id="uploadResult"></div>
    </div>

    <div class="card">
      <div class="card-title">步骤 2：执行克隆</div>
      <div class="config-grid">
        <div class="form-group">
          <label for="cloneVoiceId">voice_id（自定义标识）</label>
          <input type="text" id="cloneVoiceId" placeholder="如 my_voice_01" value="">
        </div>
        <div class="form-group">
          <label for="cloneFileId">file_id（上传后自动填充）</label>
          <input type="number" id="cloneFileId" placeholder="从步骤1获取" value="">
        </div>
        <div class="form-group">
          <label for="clonePromptFileId">prompt_file_id（可选）</label>
          <input type="number" id="clonePromptFileId" placeholder="prompt音频file_id">
        </div>
        <div class="form-group">
          <label for="clonePromptText">prompt_text（可选）</label>
          <input type="text" id="clonePromptText" placeholder="提示文本">
        </div>
        <div class="form-group">
          <label for="clonePreviewText">preview_text（试听文本）</label>
          <input type="text" id="clonePreviewText" placeholder="试听用短文本">
        </div>
        <div class="form-group">
          <label for="cloneModel">model（可选）</label>
          <input type="text" id="cloneModel" placeholder="如 speech-02-hd">
        </div>
        <div class="form-group full-width">
          <div class="checkbox-row">
            <input type="checkbox" id="needNoiseReduction">
            <label for="needNoiseReduction" style="font-weight:400;cursor:pointer">降噪（need_noise_reduction）</label>
          </div>
          <div class="checkbox-row">
            <input type="checkbox" id="needVolumeNormalization">
            <label for="needVolumeNormalization" style="font-weight:400;cursor:pointer">音量标准化（need_volume_normalization）</label>
          </div>
        </div>
      </div>
      <button class="btn-primary" id="cloneBtn" onclick="handleCloneVoice()">克隆</button>
      <div id="cloneResult"></div>
    </div>
  </div>

  <!-- ======================== TAB: DESIGN ======================== -->
  <div class="tab-content" id="tab-design">
    <div class="card">
      <div class="card-title">声音设计</div>
      <div class="config-grid">
        <div class="form-group">
          <label for="designProvider">Provider</label>
          <select id="designProvider">
            <option value="mock">mock</option>
            <option value="minimax">minimax</option>
          </select>
        </div>
        <div class="form-group">
          <label for="designVoiceId">voice_id（可选，自定义标识）</label>
          <input type="text" id="designVoiceId" placeholder="不填则自动生成">
        </div>
        <div class="form-group full-width">
          <label for="designPrompt">prompt（音色描述）</label>
          <textarea id="designPrompt" placeholder="如：成熟女性，温柔知性，声音清晰，语速适中" style="min-height:80px"></textarea>
        </div>
        <div class="form-group full-width">
          <label for="designPreviewText">preview_text（试听文本，500字以内）</label>
          <textarea id="designPreviewText" placeholder="输入试听文本，建议20-100字" style="min-height:80px" maxlength="500"></textarea>
        </div>
      </div>
      <button class="btn-primary" id="designBtn" onclick="handleDesignVoice()">生成设计</button>
      <div id="designResult"></div>
    </div>
  </div>

  <!-- ======================== TAB: BINDINGS ======================== -->
  <div class="tab-content" id="tab-bindings">
    <div class="card">
      <div class="card-title">声音绑定列表</div>
      <div class="config-grid">
        <div class="form-group">
          <label for="bindingProfileSelect">声音人设</label>
          <select id="bindingProfileSelect">
            <option value="">加载中…</option>
          </select>
        </div>
      </div>
      <button class="btn-primary" onclick="handleListBindings()">查询</button>
      <div id="bindingListResults"></div>
    </div>

    <div class="card">
      <div class="card-title">创建绑定</div>
      <div class="config-grid">
        <div class="form-group">
          <label for="newBindingProfile">声音人设</label>
          <select id="newBindingProfile">
            <option value="">加载中…</option>
          </select>
        </div>
        <div class="form-group">
          <label for="newBindingProvider">Provider</label>
          <select id="newBindingProvider">
            <option value="mock">mock</option>
            <option value="minimax">minimax</option>
          </select>
        </div>
        <div class="form-group">
          <label for="newBindingModel">Model</label>
          <input type="text" id="newBindingModel" value="speech-2.8-hd" placeholder="speech-2.8-hd">
        </div>
        <div class="form-group">
          <label for="newBindingVoiceId">Provider Voice ID</label>
          <input type="text" id="newBindingVoiceId" placeholder="如 Wise_Woman">
        </div>
        <div class="form-group">
          <label for="newBindingPriority">优先级</label>
          <input type="number" id="newBindingPriority" value="1" min="1" max="99">
        </div>
        <div class="form-group full-width">
          <label for="newBindingParams">参数（JSON，可选）</label>
          <input type="text" id="newBindingParams" placeholder='{"speed": 0.9}'>
        </div>
      </div>
      <button class="btn-primary" onclick="handleCreateBinding()">创建</button>
      <div id="createBindingResult"></div>
    </div>
  </div>

</div>

<script>
  // ============================================================
  // Tab switching
  // ============================================================
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
    });
  });

  // ============================================================
  // TTS Tab
  // ============================================================
  const textInput = document.getElementById('textInput');
  const charCount = document.getElementById('charCount');
  const profileSelect = document.getElementById('profileSelect');
  const providerSelect = document.getElementById('providerSelect');
  const genModes = document.getElementsByName('genMode');
  const variantCountRow = document.getElementById('variantCountRow');
  const variantCountInput = document.getElementById('variantCount');
  const needSubtitle = document.getElementById('needSubtitle');
  const generateBtn = document.getElementById('generateBtn');
  const resultsArea = document.getElementById('resultsArea');

  textInput.addEventListener('input', () => {
    charCount.textContent = `${textInput.value.length} / 9500`;
  });

  genModes.forEach(r => r.addEventListener('change', () => {
    const mode = document.querySelector('input[name="genMode"]:checked').value;
    variantCountRow.classList.toggle('visible', mode === 'variants');
    document.getElementById('subtitleRow').style.display = mode === 'stream' ? 'none' : '';
  }));

  (async () => {
    try {
      const res = await fetch('/api/voice/profiles');
      const profiles = await res.json();
      profileSelect.innerHTML = '';
      if (!profiles || profiles.length === 0) {
        profileSelect.innerHTML = '<option value="">无可用人设</option>';
        return;
      }
      profiles.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p.id;
        opt.textContent = p.name;
        profileSelect.appendChild(opt);
      });

      // Also populate binding tab selects
      const bindingSelects = ['bindingProfileSelect', 'newBindingProfile'];
      bindingSelects.forEach(selectId => {
        const sel = document.getElementById(selectId);
        if (!sel) return;
        sel.innerHTML = '';
        profiles.forEach(p => {
          const opt = document.createElement('option');
          opt.value = p.id;
          opt.textContent = p.name;
          sel.appendChild(opt);
        });
      });
    } catch (e) {
      profileSelect.innerHTML = '<option value="">加载失败</option>';
    }
  })();

  function setLoading(on) {
    generateBtn.disabled = on;
    generateBtn.innerHTML = on
      ? '<span class="spinner"></span>生成中…'
      : '生成';
  }

  function statusLabel(s) {
    const m = { success: '已完成', failed: '失败', running: '生成中', pending: '等待中', processing: '处理中' };
    return m[s] || s;
  }

  function statusClass(s) {
    return 'job-status status-' + s;
  }

  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  let pollTimer = null;

  async function handleGenerate() {
    const text = textInput.value.trim();
    if (!text) { alert('请输入文案'); return; }
    const profileId = profileSelect.value;
    if (!profileId) { alert('请选择声音人设'); return; }
    const provider = providerSelect.value;
    const mode = document.querySelector('input[name="genMode"]:checked').value;
    const isVariant = mode === 'variants';
    const isAsync = mode === 'async';
    const isStream = mode === 'stream';
    const count = parseInt(variantCountInput.value) || 3;
    const subtitle = needSubtitle.checked;
    const outputFormat = document.getElementById('outputFormat').value;
    const speed = document.getElementById('paramSpeed').value;
    const vol = document.getElementById('paramVol').value;
    const pitch = document.getElementById('paramPitch').value;
    const emotion = document.getElementById('paramEmotion').value;

    if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
    setLoading(true);
    resultsArea.classList.remove('visible');
    resultsArea.innerHTML = '';

    if (isStream) {
      startStreamGenerate(text, profileId, provider, subtitle, outputFormat, { speed, vol, pitch, emotion });
      return;
    }

    try {
      const payload = {
        text,
        profile_id: profileId,
        provider,
        need_subtitle: subtitle,
        output_format: outputFormat,
        ...(speed ? { speed: parseFloat(speed) } : {}),
        ...(vol ? { vol: parseFloat(vol) } : {}),
        ...(pitch ? { pitch: parseInt(pitch) } : {}),
        ...(emotion ? { emotion } : {}),
        ...(isVariant ? { variant_count: Math.min(5, Math.max(1, count)), scene: '试音台' } : {})
      };

      let endpoint;
      if (isAsync) endpoint = '/api/voice/render/async';
      else if (isVariant) endpoint = '/api/voice/variants/render';
      else endpoint = '/api/voice/render';

      const resp = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      const data = await resp.json();

      if (!resp.ok) {
        const msg = data.detail || JSON.stringify(data);
        resultsArea.innerHTML = `<div class="error-msg">请求失败：${esc(msg)}</div>`;
        resultsArea.classList.add('visible');
        setLoading(false);
        return;
      }

      if (isAsync) {
        startAsyncPolling(data.job_id);
      } else {
        renderResults(data, isVariant);
        resultsArea.classList.add('visible');
        setLoading(false);
      }
    } catch (e) {
      resultsArea.innerHTML = `<div class="error-msg">网络错误：${esc(e.message)}</div>`;
      resultsArea.classList.add('visible');
      setLoading(false);
    }
  }

  function startStreamGenerate(text, profileId, provider, subtitle, outputFormat, voiceParams) {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsUrl = `${proto}//${location.host}/api/voice/ws/render`;

    resultsArea.innerHTML = `
        <div class="card" id="streamStatusCard">
            <div class="result-label">流式生成</div>
            <div class="stream-progress">
                <span class="spinner"></span>
                <span id="streamStatusText">连接中…</span>
            </div>
            <div class="stream-stats" id="streamStats" style="display:none">
                <span>已接收: <strong id="streamChunkCount">0</strong> 个片段</span>
                <span>已接收时长: <strong id="streamDuration">0</strong> ms</span>
            </div>
        </div>`;
    resultsArea.classList.add('visible');

    const ws = new WebSocket(wsUrl);
    const audioChunks = [];

    ws.onopen = () => {
        const { speed, vol, pitch, emotion } = voiceParams || {};
        ws.send(JSON.stringify({
            event: "start",
            text: text,
            profile_id: profileId,
            provider: provider,
            output_format: outputFormat,
            need_subtitle: subtitle,
            ...(speed ? { speed } : {}),
            ...(vol ? { vol: parseFloat(vol) } : {}),
            ...(pitch ? { pitch: parseInt(pitch) } : {}),
            ...(emotion ? { emotion } : {}),
        }));
    };

    ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);

        switch (msg.event) {
            case "connected":
                document.getElementById('streamStatusText').textContent =
                    `已连接 (${msg.request_id})`;
                break;
            case "started":
                document.getElementById('streamStatusText').textContent =
                    `生成中… (${msg.provider} / ${msg.model})`;
                document.getElementById('streamStats').style.display = '';
                break;
            case "audio_chunk":
                audioChunks.push(msg.audio_base64);
                document.getElementById('streamChunkCount').textContent =
                    audioChunks.length;
                if (msg.duration_ms) {
                    const el = document.getElementById('streamDuration');
                    el.textContent = parseInt(el.textContent || '0') + msg.duration_ms;
                }
                break;
            case "completed":
                renderStreamResult(msg, audioChunks);
                setLoading(false);
                ws.close();
                break;
            case "error":
                resultsArea.innerHTML = `<div class="error-msg">流式生成失败：[${esc(msg.code)}] ${esc(msg.message)}</div>`;
                resultsArea.classList.add('visible');
                setLoading(false);
                ws.close();
                break;
        }
    };

    ws.onerror = () => {
        resultsArea.innerHTML = `<div class="error-msg">WebSocket 连接失败</div>`;
        resultsArea.classList.add('visible');
        setLoading(false);
    };

    ws.onclose = (event) => {
        if (event.code !== 1000 && !resultsArea.querySelector('.result-section') && !resultsArea.querySelector('.error-msg')) {
            resultsArea.innerHTML = `<div class="error-msg">连接断开 (code: ${event.code})</div>`;
            resultsArea.classList.add('visible');
            setLoading(false);
        }
    };
  }

  function renderStreamResult(completed, audioChunks) {
    const binaryParts = audioChunks.map(b64 => {
        const binary = atob(b64);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) {
            bytes[i] = binary.charCodeAt(i);
        }
        return bytes;
    });
    const blob = new Blob(binaryParts, { type: 'audio/mpeg' });
    const blobUrl = URL.createObjectURL(blob);

    const asset = completed.audio_asset;
    resultsArea.innerHTML = `
        <div class="result-section">
            <div class="result-label">流式生成结果</div>
            <span class="job-status status-success">已完成</span>
            <p style="font-size:0.82rem;color:#718096;margin-top:6px">
                任务ID：<code>${esc(completed.job_id)}</code>
                · 片段数: ${completed.total_chunks}
                · 总时长: ${completed.total_duration_ms} ms
                · 字符数: ${completed.total_characters}
            </p>
            <audio class="audio-player" controls preload="auto">
                <source src="${blobUrl}" type="audio/mpeg">
                您的浏览器不支持音频播放
            </audio>
            <div class="action-row">
                ${asset ? `<a class="btn-sm" href="/api/voice/assets/${asset.id}/download" download>下载(服务端)</a>` : ''}
                <a class="btn-sm" href="${blobUrl}" download="stream_audio.mp3">下载(本地缓存)</a>
            </div>
        </div>`;
    resultsArea.classList.add('visible');
  }

  function startAsyncPolling(jobId) {
    let pollCount = 0;
    const maxPolls = 120;

    resultsArea.innerHTML = `
      <div class="card" id="asyncStatusCard">
        <div class="result-label">异步任务</div>
        <p>任务ID：<code>${esc(jobId)}</code></p>
        <div class="poll-status"><span class="spinner"></span>轮询中…</div>
      </div>`;
    resultsArea.classList.add('visible');

    async function poll() {
      pollCount++;
      try {
        const resp = await fetch(`/api/voice/render/async/${jobId}/status`);
        const data = await resp.json();

        if (!resp.ok) {
          clearInterval(pollTimer); pollTimer = null;
          resultsArea.innerHTML = `<div class="error-msg">查询失败：${esc(data.detail || JSON.stringify(data))}</div>`;
          setLoading(false);
          return;
        }

        if (data.status === 'success') {
          clearInterval(pollTimer); pollTimer = null;
          renderAsyncResult(data);
          setLoading(false);
          return;
        }

        if (data.status === 'failed') {
          clearInterval(pollTimer); pollTimer = null;
          resultsArea.innerHTML = `<div class="error-msg">任务失败：${esc(data.error_message || '未知错误')}</div>`;
          setLoading(false);
          return;
        }

        const statusCard = document.getElementById('asyncStatusCard');
        if (statusCard) {
          const pollStatus = statusCard.querySelector('.poll-status');
          if (pollStatus) pollStatus.innerHTML = `<span class="spinner"></span>轮询中… (${pollCount}/${maxPolls})`;
        }

        if (pollCount >= maxPolls) {
          clearInterval(pollTimer); pollTimer = null;
          resultsArea.innerHTML += `<div class="error-msg">轮询超时，请稍后手动查询</div>`;
          setLoading(false);
        }
      } catch (e) {
        clearInterval(pollTimer); pollTimer = null;
        resultsArea.innerHTML = `<div class="error-msg">网络错误：${esc(e.message)}</div>`;
        setLoading(false);
      }
    }

    poll();
    pollTimer = setInterval(poll, 3000);
  }

  function renderAsyncResult(data) {
    const audio = data.audio_asset;
    const sub = data.subtitle_asset;
    let html = `
      <div class="card">
        <div class="result-label">异步生成结果</div>
        <span class="${statusClass(data.status)}">${statusLabel(data.status)}</span>
        <p style="font-size:0.82rem;color:#718096;margin-top:6px">
          任务ID：<code>${esc(data.job_id)}</code>
          ${data.provider ? ` · Provider: ${esc(data.provider)}` : ''}
          ${data.model ? ` · Model: ${esc(data.model)}` : ''}
        </p>
        ${audio ? audioPlayerHtml(audio.id) : ''}
        <div class="action-row">${audio ? downloadBtnHtml(audio.id) : ''}</div>
        ${sub && sub.timeline && sub.timeline.length > 0
          ? `<div class="result-label" style="margin-top:16px">字幕时间轴</div>${timelineTable(sub.timeline)}`
          : ''}
      </div>`;
    resultsArea.innerHTML = html;
    resultsArea.classList.add('visible');
  }

  function renderResults(data, isVariant) {
    if (isVariant) {
      let html = '<div class="result-section"><div class="result-label">版本列表</div>';
      html += `<div class="variants-grid">`;
      data.variants.forEach((v, i) => {
        html += `
          <div class="variant-card">
            <div class="variant-meta">
              <span>版本 ${i + 1}</span>
              ${v.speed != null ? `<span>语速 ${v.speed}</span>` : ''}
              ${v.emotion ? `<span>情绪 ${v.emotion}</span>` : ''}
            </div>
            ${v.audio_asset_id ? audioPlayerHtml(v.audio_asset_id) : '<p style="font-size:0.82rem;color:#a0aec0">无音频</p>'}
            <div class="action-row">${v.audio_asset_id ? downloadBtnHtml(v.audio_asset_id) : ''}</div>
          </div>`;
      });
      html += '</div></div>';
      resultsArea.innerHTML = html;
    } else {
      const job = data;
      const audio = job.audio_asset;
      const subtitle = job.subtitle_asset;
      let html = `
        <div class="result-section">
          <div class="result-label">生成结果</div>
          <span class="${statusClass(job.status)}">${statusLabel(job.status)}</span>
          ${audio ? audioPlayerHtml(audio.id) : ''}
          <div class="action-row">${audio ? downloadBtnHtml(audio.id) : ''}</div>
          ${subtitle && subtitle.timeline && subtitle.timeline.length > 0
            ? `<div class="result-label" style="margin-top:16px">字幕时间轴</div>${timelineTable(subtitle.timeline)}`
            : ''}
        </div>`;
      resultsArea.innerHTML = html;
    }
  }

  function audioPlayerHtml(assetId) {
    return `<audio class="audio-player" controls preload="none">
      <source src="/api/voice/assets/${assetId}/download" type="audio/mpeg">
      您的浏览器不支持音频播放</audio>`;
  }

  function downloadBtnHtml(assetId) {
    return `<a class="btn-sm" href="/api/voice/assets/${assetId}/download" download>下载</a>`;
  }

  function timelineTable(timeline) {
    if (!timeline || timeline.length === 0) return '';
    let html = `<table class="timeline-table"><thead><tr><th>时间</th><th>文本</th></tr></thead><tbody>`;
    timeline.forEach(item => {
      const start = formatTime(item.start);
      const end = formatTime(item.end);
      html += `<tr><td>${start} → ${end}</td><td>${esc(item.text || '')}</td></tr>`;
    });
    html += '</tbody></table>';
    return html;
  }

  function formatTime(seconds) {
    if (seconds == null) return '--';
    const s = Math.floor(seconds);
    const m = Math.floor((s % 3600) / 60);
    const sec = s % 60;
    const ms = Math.round((seconds - s) * 1000);
    return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')},${String(ms).padStart(3,'0')}`;
  }

  // ============================================================
  // Voices Tab
  // ============================================================
  async function handleListVoices() {
    const provider = document.getElementById('voiceProvider').value;
    const voiceType = document.getElementById('voiceType').value;
    const resultsEl = document.getElementById('voiceListResults');
    const btn = document.getElementById('listVoicesBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>加载中…';
    resultsEl.innerHTML = '';

    try {
      const url = `/api/voice/provider-voices?provider=${encodeURIComponent(provider)}&voice_type=${encodeURIComponent(voiceType)}&refresh=true`;
      const resp = await fetch(url);
      const data = await resp.json();

      if (!resp.ok) {
        resultsEl.innerHTML = `<div class="error-msg">查询失败：${esc(data.detail || JSON.stringify(data))}</div>`;
        return;
      }

      const voices = data.voices || [];
      if (voices.length === 0) {
        resultsEl.innerHTML = '<p style="font-size:0.85rem;color:#718096;margin-top:10px">未找到音色</p>';
        return;
      }

      const typeTag = t => {
        if (t === 'system') return '<span class="tag tag-system">系统</span>';
        if (t === 'voice_cloning') return '<span class="tag tag-clone">克隆</span>';
        if (t === 'voice_generation') return '<span class="tag tag-generation">设计</span>';
        return `<span class="tag">${esc(t)}</span>`;
      };

      let html = `<table class="voice-table">
        <thead><tr><th>voice_id</th><th>名称</th><th>类型</th><th>语言</th></tr></thead><tbody>`;
      voices.forEach(v => {
        html += `<tr>
          <td><code style="font-size:0.78rem">${esc(v.provider_voice_id)}</code></td>
          <td>${esc(v.name || '-')}</td>
          <td>${typeTag(v.voice_type)}</td>
          <td>${esc(v.language || '-')}</td>
        </tr>`;
      });
      html += '</tbody></table>';
      resultsEl.innerHTML = html;
    } catch (e) {
      resultsEl.innerHTML = `<div class="error-msg">网络错误：${esc(e.message)}</div>`;
    } finally {
      btn.disabled = false;
      btn.innerHTML = '查询音色';
    }
  }

  async function handleDeleteVoice() {
    const provider = document.getElementById('deleteProvider').value;
    const voiceId = document.getElementById('deleteVoiceId').value.trim();
    const voiceType = document.getElementById('deleteVoiceType').value;
    const resultsEl = document.getElementById('deleteResults');

    if (!voiceId) {
      resultsEl.innerHTML = `<div class="error-msg">请输入 voice_id</div>`;
      return;
    }

    resultsEl.innerHTML = '<p style="font-size:0.85rem;color:#718096;margin-top:10px"><span class="spinner"></span>删除中…</p>';

    try {
      const resp = await fetch(`/api/voice/voices/delete?provider=${encodeURIComponent(provider)}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ provider_voice_id: voiceId, voice_type: voiceType })
      });
      const data = await resp.json();

      if (!resp.ok) {
        resultsEl.innerHTML = `<div class="error-msg">删除失败：${esc(data.detail || JSON.stringify(data))}</div>`;
        return;
      }

      resultsEl.innerHTML = `<div class="success-msg">
        删除成功：voice_id=<code>${esc(data.voice_id)}</code>
      </div>`;
    } catch (e) {
      resultsEl.innerHTML = `<div class="error-msg">网络错误：${esc(e.message)}</div>`;
    }
  }

  // ============================================================
  // Clone Tab
  // ============================================================
  async function handleUploadAudio() {
    const provider = document.getElementById('cloneProvider').value;
    const purpose = document.getElementById('clonePurpose').value;
    const fileInput = document.getElementById('cloneFile');
    const resultsEl = document.getElementById('uploadResult');
    const btn = document.getElementById('uploadBtn');

    if (!fileInput.files || !fileInput.files[0]) {
      resultsEl.innerHTML = `<div class="error-msg">请先选择音频文件</div>`;
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>上传中…';
    resultsEl.innerHTML = '<p style="font-size:0.85rem;color:#718096;margin-top:10px"><span class="spinner"></span>上传中…</p>';

    try {
      const formData = new FormData();
      formData.append('purpose', purpose);
      formData.append('provider', provider);
      formData.append('file', fileInput.files[0]);

      const resp = await fetch('/api/voice/clone/upload', {
        method: 'POST',
        body: formData
      });
      const data = await resp.json();

      if (!resp.ok) {
        resultsEl.innerHTML = `<div class="error-msg">上传失败：${esc(data.detail || JSON.stringify(data))}</div>`;
        return;
      }

      // Auto-fill file_id in step 2
      document.getElementById('cloneFileId').value = data.file_id;

      resultsEl.innerHTML = `<div class="success-msg">
        上传成功：file_id=<code>${data.file_id}</code>，文件名=${esc(data.filename)}，大小=${data.bytes} bytes
      </div>`;
    } catch (e) {
      resultsEl.innerHTML = `<div class="error-msg">网络错误：${esc(e.message)}</div>`;
    } finally {
      btn.disabled = false;
      btn.innerHTML = '上传';
    }
  }

  async function handleCloneVoice() {
    const provider = document.getElementById('cloneProvider').value;
    const voiceId = document.getElementById('cloneVoiceId').value.trim();
    const fileId = document.getElementById('cloneFileId').value.trim();
    const promptFileId = document.getElementById('clonePromptFileId').value.trim();
    const promptText = document.getElementById('clonePromptText').value.trim();
    const previewText = document.getElementById('clonePreviewText').value.trim();
    const model = document.getElementById('cloneModel').value.trim();
    const needNoiseReduction = document.getElementById('needNoiseReduction').checked;
    const needVolumeNormalization = document.getElementById('needVolumeNormalization').checked;
    const resultsEl = document.getElementById('cloneResult');
    const btn = document.getElementById('cloneBtn');

    if (!voiceId) {
      resultsEl.innerHTML = `<div class="error-msg">请输入 voice_id</div>`;
      return;
    }
    if (!fileId) {
      resultsEl.innerHTML = `<div class="error-msg">请先上传音频获取 file_id，或手动输入</div>`;
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>克隆中…';
    resultsEl.innerHTML = '<p style="font-size:0.85rem;color:#718096;margin-top:10px"><span class="spinner"></span>克隆中…</p>';

    try {
      const payload = {
        voice_id: voiceId,
        file_id: parseInt(fileId),
        need_noise_reduction: needNoiseReduction,
        need_volume_normalization: needVolumeNormalization,
      };
      if (promptFileId) payload.prompt_file_id = parseInt(promptFileId);
      if (promptText) payload.prompt_text = promptText;
      if (previewText) payload.preview_text = previewText;
      if (model) payload.model = model;

      const resp = await fetch(`/api/voice/clone/create?provider=${encodeURIComponent(provider)}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const data = await resp.json();

      if (!resp.ok) {
        resultsEl.innerHTML = `<div class="error-msg">克隆失败：${esc(data.detail || JSON.stringify(data))}</div>`;
        return;
      }

      let html = `<div class="success-msg">
        克隆成功：voice_id=<code>${esc(data.voice_id)}</code>，${data.message || ''}
      </div>`;
      if (data.demo_audio_url) {
        html += `<div style="margin-top:10px">
          <audio class="audio-player" controls preload="none">
            <source src="${esc(data.demo_audio_url)}" type="audio/mpeg">
            您的浏览器不支持音频播放</audio>
        </div>`;
      }
      resultsEl.innerHTML = html;
    } catch (e) {
      resultsEl.innerHTML = `<div class="error-msg">网络错误：${esc(e.message)}</div>`;
    } finally {
      btn.disabled = false;
      btn.innerHTML = '克隆';
    }
  }

  // ============================================================
  // Design Tab
  // ============================================================
  async function handleDesignVoice() {
    const provider = document.getElementById('designProvider').value;
    const voiceId = document.getElementById('designVoiceId').value.trim() || null;
    const prompt = document.getElementById('designPrompt').value.trim();
    const previewText = document.getElementById('designPreviewText').value.trim();
    const resultsEl = document.getElementById('designResult');
    const btn = document.getElementById('designBtn');

    if (!prompt) {
      resultsEl.innerHTML = `<div class="error-msg">请输入音色描述（prompt）</div>`;
      return;
    }
    if (!previewText) {
      resultsEl.innerHTML = `<div class="error-msg">请输入试听文本（preview_text）</div>`;
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>生成中…';
    resultsEl.innerHTML = '<p style="font-size:0.85rem;color:#718096;margin-top:10px"><span class="spinner"></span>生成中…</p>';

    try {
      const payload = { prompt, preview_text: previewText };
      if (voiceId) payload.voice_id = voiceId;

      const resp = await fetch(`/api/voice/design/create?provider=${encodeURIComponent(provider)}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const data = await resp.json();

      if (!resp.ok) {
        resultsEl.innerHTML = `<div class="error-msg">设计失败：${esc(data.detail || JSON.stringify(data))}</div>`;
        return;
      }

      let html = `<div class="success-msg">
        设计成功：voice_id=<code>${esc(data.voice_id)}</code>，${data.message || ''}
      </div>`;

      if (data.trial_audio_hex) {
        // Decode hex to binary and play if possible
        html += `<div class="hex-player">
          <div style="font-size:0.78rem;color:#718096;margin-bottom:6px">
            试听音频（hex原始数据，mock模式下为null）
          </div>
          <div style="font-family:monospace;font-size:0.72rem;color:#a0aec0;word-break:break-all;max-height:60px;overflow:hidden">
            ${esc(data.trial_audio_hex.substring(0, 200))}${data.trial_audio_hex.length > 200 ? '…' : ''}
          </div>
        </div>`;
      } else if (data.trial_audio_url) {
        html += `<div style="margin-top:10px">
          <audio class="audio-player" controls preload="none">
            <source src="${esc(data.trial_audio_url)}" type="audio/mpeg">
            您的浏览器不支持音频播放</audio>
        </div>`;
      }

      resultsEl.innerHTML = html;
    } catch (e) {
      resultsEl.innerHTML = `<div class="error-msg">网络错误：${esc(e.message)}</div>`;
    } finally {
      btn.disabled = false;
      btn.innerHTML = '生成设计';
    }
  }

  // ============================================================
  // Bindings Tab
  // ============================================================
  async function handleListBindings() {
    const profileId = document.getElementById('bindingProfileSelect').value;
    const resultDiv = document.getElementById('bindingListResults');
    if (!profileId) {
      resultDiv.innerHTML = '<div class="error-msg">请先选择人设</div>';
      return;
    }
    resultDiv.innerHTML = '<div style="font-size:0.85rem;color:#718096">加载中…</div>';
    try {
      const resp = await fetch(`/api/voice/profiles/${profileId}/bindings`);
      const bindings = await resp.json();
      if (!Array.isArray(bindings) || bindings.length === 0) {
        resultDiv.innerHTML = '<div style="font-size:0.85rem;color:#718096">暂无绑定记录</div>';
        return;
      }
      let html = `<table style="width:100%;font-size:0.82rem;border-collapse:collapse;margin-top:12px">
        <thead>
          <tr style="background:#f7fafc;text-align:left">
            <th style="padding:6px 8px;border-bottom:1px solid #e2e8f0">Provider</th>
            <th style="padding:6px 8px;border-bottom:1px solid #e2e8f0">Model</th>
            <th style="padding:6px 8px;border-bottom:1px solid #e2e8f0">Voice ID</th>
            <th style="padding:6px 8px;border-bottom:1px solid #e2e8f0">优先级</th>
            <th style="padding:6px 8px;border-bottom:1px solid #e2e8f0">状态</th>
            <th style="padding:6px 8px;border-bottom:1px solid #e2e8f0">操作</th>
          </tr>
        </thead>
        <tbody>`;
      bindings.forEach(b => {
        html += `<tr>
          <td style="padding:6px 8px;border-bottom:1px solid #e2e8f0">${esc(b.provider || '')}</td>
          <td style="padding:6px 8px;border-bottom:1px solid #e2e8f0">${esc(b.model || '')}</td>
          <td style="padding:6px 8px;border-bottom:1px solid #e2e8f0"><code>${esc(b.provider_voice_id || '')}</code></td>
          <td style="padding:6px 8px;border-bottom:1px solid #e2e8f0">${esc(b.priority || '')}</td>
          <td style="padding:6px 8px;border-bottom:1px solid #e2e8f0"><span class="job-status status-${b.status === 'available' ? 'success' : 'failed'}">${esc(b.status || '')}</span></td>
          <td style="padding:6px 8px;border-bottom:1px solid #e2e8f0">
            <button class="btn-sm" onclick="handleDeleteBinding('${esc(b.id)}')">删除</button>
          </td>
        </tr>`;
      });
      html += '</tbody></table>';
      resultDiv.innerHTML = html;
    } catch (e) {
      resultDiv.innerHTML = `<div class="error-msg">查询失败：${esc(e.message)}</div>`;
    }
  }

  async function handleCreateBinding() {
    const profileId = document.getElementById('newBindingProfile').value;
    const provider = document.getElementById('newBindingProvider').value;
    const model = document.getElementById('newBindingModel').value.trim();
    const voiceId = document.getElementById('newBindingVoiceId').value.trim();
    const priority = parseInt(document.getElementById('newBindingPriority').value) || 1;
    const paramsStr = document.getElementById('newBindingParams').value.trim();
    const resultDiv = document.getElementById('createBindingResult');

    if (!profileId) { resultDiv.innerHTML = '<div class="error-msg">请选择人设</div>'; return; }
    if (!model) { resultDiv.innerHTML = '<div class="error-msg">请填写 Model</div>'; return; }
    if (!voiceId) { resultDiv.innerHTML = '<div class="error-msg">请填写 Provider Voice ID</div>'; return; }

    let params = {};
    if (paramsStr) {
      try { params = JSON.parse(paramsStr); }
      catch (e) { resultDiv.innerHTML = `<div class="error-msg">参数 JSON 格式错误：${esc(e.message)}</div>`; return; }
    }

    try {
      const resp = await fetch(`/api/voice/profiles/${profileId}/bindings`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          provider,
          model,
          provider_voice_id: voiceId,
          priority,
          params,
        }),
      });
      const data = await resp.json();
      if (!resp.ok) {
        resultDiv.innerHTML = `<div class="error-msg">创建失败：${esc(data.detail || JSON.stringify(data))}</div>`;
        return;
      }
      resultDiv.innerHTML = '<div style="color:#2f855a;font-size:0.85rem">绑定创建成功</div>';
      document.getElementById('newBindingVoiceId').value = '';
      document.getElementById('newBindingParams').value = '';
      // Refresh list if same profile is selected
      if (document.getElementById('bindingProfileSelect').value === profileId) {
        handleListBindings();
      }
    } catch (e) {
      resultDiv.innerHTML = `<div class="error-msg">创建失败：${esc(e.message)}</div>`;
    }
  }

  async function handleDeleteBinding(bindingId) {
    if (!confirm('确定删除该绑定？')) return;
    try {
      const resp = await fetch(`/api/voice/bindings/${bindingId}`, { method: 'DELETE' });
      if (!resp.ok) {
        const data = await resp.json();
        alert('删除失败：' + (data.detail || '未知错误'));
        return;
      }
      handleListBindings();
    } catch (e) {
      alert('删除失败：' + e.message);
    }
  }
</script>
</body>
</html>
