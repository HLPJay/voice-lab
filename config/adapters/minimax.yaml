adapter_type: "minimax"

default_base_url: "https://api.minimaxi.com"

default_model: "speech-2.8-hd"

default_timeout_seconds: 120

endpoints:
  t2a: "/v1/t2a_v2"
  t2a_async: "/v1/t2a_async_v2"
  query_async: "/v1/query/t2a_async_query_v2"
  file_upload: "/v1/files/upload"
  voice_clone: "/v1/voice_clone"
  voice_design: "/v1/voice_design"
  delete_voice: "/v1/delete_voice"
  list_voices: "/v1/list_voices"

tts:
  supported: true
  models:
    - "speech-2.8-hd"
    - "speech-02.5-turbo"
  default_model: "speech-2.8-hd"
  max_text_chars: 10000
  audio_formats:
    - "mp3"
    - "wav"
    - "flac"
  supports_subtitle: true
  supports_streaming: true
  supports_emotion: true

batch:
  supported: true
  max_text_chars: 50000
  max_segments: 200

script:
  supported: true
  max_text_chars: 50000
  max_segments: 200

voice_clone:
  supported: true
  preview_text_max: 1000
  supports_noise_reduction: true
  supports_volume_normalization: true
  max_file_size_mb: 20

voice_design:
  supported: true
  prompt_max: 2000
  preview_text_max: 500

provider_voices:
  supported: true
  supports_list_voices: true
  supports_delete_voice: true
  supports_import_remote_voice: true
  preview_text_max: 1000

metadata:
  ws_model: "speech-2.8-hd"
  clone_audio_max_size_mb: 20
  note: "MiniMax adapter configuration"
