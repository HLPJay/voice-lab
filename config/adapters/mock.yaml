adapter_type: "mock"

plugin:
  import_path: "app.providers.mock_speech_adapter.MockSpeechAdapter"

default_model: "mock-tts"

default_timeout_seconds: 30

endpoints: {}

tts:
  supported: true
  models:
    - "mock-tts"
  default_model: "mock-tts"
  max_text_chars: 10000
  audio_formats:
    - "mp3"
    - "wav"
    - "flac"
  supports_subtitle: true
  supports_streaming: true
  supports_emotion: true
  speed:
    min: 0.5
    max: 2.0
  vol:
    min: 0.1
    max: 10.0
  pitch:
    min: -12
    max: 12

batch:
  supported: true
  max_text_chars: 50000
  max_segments: 200
  segment_strategies:
    - "auto"
    - "paragraph"
    - "sentence"
    - "line"
  max_segment_chars:
    min: 100
    max: 5000
  silence_between_ms:
    min: 0
    max: 3000
  supports_merge_audio: true
  supports_merge_subtitle: true

script:
  supported: true
  max_text_chars: 50000
  max_segments: 200
  segment_strategies:
    - "line"
  max_segment_chars:
    min: 100
    max: 5000
  silence_between_ms:
    min: 0
    max: 3000
  supports_merge_audio: true
  supports_merge_subtitle: true

voice_clone:
  supported: true
  preview_text_max: 1000
  supports_noise_reduction: true
  supports_volume_normalization: true
  max_file_size_mb: 20
  voice_id:
    min_length: 8
    max_length: 256
    pattern: "^[a-zA-Z](?:[a-zA-Z0-9_-]*[a-zA-Z0-9])?$"
    hint: "至少 8 位，必须以字母开头，只能包含字母、数字、下划线和短横线，且不能以短横线或下划线结尾"

voice_design:
  supported: true
  prompt_max: 2000
  preview_text_max: 500
  voice_id:
    min_length: 8
    max_length: 256
    pattern: "^[a-zA-Z](?:[a-zA-Z0-9_-]*[a-zA-Z0-9])?$"
    hint: "至少 8 位，必须以字母开头，只能包含字母、数字、下划线和短横线，且不能以短横线或下划线结尾"

provider_voices:
  supported: true
  supports_list_voices: true
  supports_delete_voice: true
  supports_import_remote_voice: true
  preview_text_max: 1000

metadata:
  mode: "mock"
